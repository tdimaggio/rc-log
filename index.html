<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RC Race Replay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: 'Barlow', system-ui, -apple-system, sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      height: 100%;
      overflow: hidden;
      font-size: 20px;
    }
    body {
      display: flex;
      flex-direction: column;
      min-width: 820px;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    #header {
      background-color: #141414;
      background-image:
        repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(255,255,255,0.018) 2px, rgba(255,255,255,0.018) 3px),
        repeating-linear-gradient(-45deg, transparent, transparent 2px, rgba(255,255,255,0.018) 2px, rgba(255,255,255,0.018) 3px);
      border-bottom: 1px solid #222222;
      padding: 10px 16px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    #header input[type="text"] {
      background: #0a0a0a;
      border: 1px solid #2a2a2a;
      color: #e0e0e0;
      padding: 7px 11px;
      font-size: 13px;
      font-family: inherit;
      border-radius: 7px;
      transition: border-color 0.15s, background 0.15s;
    }
    #header input[type="text"]:focus { outline: none; border-color: #e53935; background: #0f0f0f; }
    #eventUrl  { width: 260px; }
    #raceUrl   { width: 260px; }
    #apiKeyInput { width: 210px; }
    .sss-wrap { position: relative; display: inline-flex; }
    #sssBtn { white-space: nowrap; }
    #sssDropdown {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      min-width: 280px;
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      z-index: 999;
      overflow: hidden;
    }
    #sssDropdown.open { display: block; }
    .sss-item {
      padding: 9px 14px;
      cursor: pointer;
      font-size: 17px;
      color: #cccccc;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid #222222;
    }
    .sss-item:last-child { border-bottom: none; }
    .sss-item:hover { background: #202020; color: #fff; }
    .sss-item .sss-heats { color: #666; font-size: 13px; flex-shrink: 0; }
    .sss-status { padding: 10px 14px; font-size: 17px; color: #666; font-style: italic; }

    .btn {
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      color: #bbbbbb;
      padding: 7px 14px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      border-radius: 7px;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn:hover { background: #252525; border-color: #3a3a3a; color: #e0e0e0; }
    .btn-primary { background: #c0392b; border-color: #c0392b; color: #fff; }
    .btn-primary:hover { background: #e74c3c; border-color: #e74c3c; }
    .btn-primary:disabled { background: #4a1a18; border-color: #4a1a18; color: #666; cursor: default; }

    .sep { color: #242424; margin: 0 4px; user-select: none; }

    .speed-wrap {
      display: flex; align-items: center; gap: 8px; font-size: 13px; color: #777777;
    }
    #speedSlider { width: 80px; accent-color: #e53935; }

    /* ── Main 3-column layout ───────────────────────────────────────── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Resize handles ────────────────────────────────────────────── */
    .resize-handle {
      width: 5px;
      flex-shrink: 0;
      background: #222222;
      cursor: col-resize;
      position: relative;
      transition: background 0.15s;
      z-index: 10;
    }
    .resize-handle:hover,
    .resize-handle.resizing { background: #cc0000; }
    .resize-handle::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      height: 32px;
      width: 2px;
      background: #888888;
      border-radius: 1px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .resize-handle:hover::after,
    .resize-handle.resizing::after { opacity: 1; }

    /* ── Left sidebar ───────────────────────────────────────────────── */
    #sidebar-left {
      width: 190px;
      min-width: 120px;
      background: #111111;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #sidebar-left h3 {
      font-size: 11px;
      font-weight: 600;
      color: #555555;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 12px 12px 6px;
      flex-shrink: 0;
    }
    #heatList {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px 8px;
    }
    .heat-section {
      font-size: 11px;
      font-weight: 600;
      color: #444444;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 10px 6px 4px;
    }
    .heat-item {
      padding: 7px 10px;
      font-size: 17px;
      cursor: pointer;
      border-radius: 6px;
      color: #777777;
      margin-bottom: 2px;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.1s, color 0.1s;
    }
    .heat-item:hover { background: #1a1a1a; color: #c0c0c0; }
    .heat-item.active { background: #c0392b; color: #fff; font-weight: 500; }

    /* ── Center ─────────────────────────────────────────────────────── */
    #center {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }
    #race-header {
      background: #111111;
      border-bottom: 1px solid #222222;
      padding: 10px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    #raceTitle    { font-size: 17px; font-weight: 600; color: #e8e8e8; }
    #raceSub      { font-size: 17px; color: #555555; margin-top: 3px; }
    #lapCounter   { font-size: 22px; font-weight: 700; color: #e53935; letter-spacing: -0.5px; }
    #raceTime     { font-size: 17px; color: #777777; text-align: right; margin-top: 3px; }

    #vizWrap {
      flex: 1;
      overflow: auto;
      padding: 14px 18px;
    }
    #vizArea { min-height: 200px; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 300px;
      color: #333333;
      font-size: 13px;
      gap: 10px;
    }
    .empty-state .icon { font-size: 44px; }

    /* ── Right sidebar ──────────────────────────────────────────────── */
    #sidebar-right {
      width: 225px;
      min-width: 120px;
      background: #111111;
      overflow-y: auto;
      padding: 10px;
    }

    .stat-card {
      background: #0a0a0a;
      border: 1px solid #222222;
      border-radius: 9px;
      padding: 12px 13px;
      margin-bottom: 10px;
      font-size: 17px;
    }
    .stat-card .card-title {
      font-size: 13px;
      color: #e53935;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .stat-card .card-sub {
      font-size: 13px;
      color: #444444;
      margin-bottom: 9px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
      color: #666666;
    }
    .stat-row .v { color: #e0e0e0; }

    .spicy-card {
      background: #0a0a0a;
      border: 1px solid #222222;
      border-radius: 9px;
      padding: 12px 13px;
      font-size: 17px;
    }
    .spicy-card .card-title {
      font-size: 13px;
      color: #f5c842;
      font-weight: 600;
      margin-bottom: 9px;
    }
    .spicy-text { color: #888888; line-height: 1.7; }
    .spicy-text.loading { color: #444444; font-style: italic; }

    .error-msg { color: #e53935; font-size: 17px; }

    /* ── Tooltip ────────────────────────────────────────────────────── */
    #tooltip {
      position: fixed;
      pointer-events: none;
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 9px;
      padding: 10px 13px;
      font-size: 17px;
      color: #e0e0e0;
      z-index: 1000;
      display: none;
      min-width: 170px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.6);
    }
    .tt-driver { font-weight: 700; font-size: 13px; margin-bottom: 7px; }
    .tt-row { display: flex; justify-content: space-between; gap: 14px; margin-bottom: 4px; color: #666666; }
    .tt-row .tt-v { color: #e0e0e0; font-variant-numeric: tabular-nums; }
    .tt-divider { border: none; border-top: 1px solid #222222; margin: 6px 0; }
    .tt-badge { font-size: 13px; margin-top: 5px; }

    /* ── Scrubber ───────────────────────────────────────────────────── */
    #scrubberWrap {
      padding: 0 18px 10px;
      flex-shrink: 0;
      background: #111111;
      display: none;
    }
    #scrubberTrack {
      height: 5px;
      background: #1a1a1a;
      border-radius: 3px;
      position: relative;
      cursor: pointer;
    }
    #scrubberFill {
      height: 100%;
      background: #e53935;
      border-radius: 3px;
      pointer-events: none;
      width: 0%;
    }
    #scrubberThumb {
      position: absolute;
      top: 50%;
      left: 0%;
      transform: translate(-50%, -50%);
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: #e53935;
      border: 2px solid #e0e0e0;
      cursor: grab;
      opacity: 0;
      transition: opacity 0.15s;
    }
    #scrubberTrack:hover #scrubberThumb,
    #scrubberThumb.dragging { opacity: 1; }
    #scrubberThumb.dragging { cursor: grabbing; }

    /* ── Driver highlight ───────────────────────────────────────────── */
    .stat-card { cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
    .stat-card.highlighted { border-color: var(--card-color, #e53935); box-shadow: 0 0 0 1px var(--card-color, #e53935); }
    .compact-driver-row.highlighted { background: #1a1a1a; box-shadow: inset 3px 0 0 var(--card-color, #e53935); }

    /* ── Driver hover popup ─────────────────────────────────────────── */
    #driver-popup {
      display: none;
      position: fixed;
      z-index: 300;
      width: 200px;
      background: #0a0a0a;
      border: 1px solid #cc0000;
      border-radius: 9px;
      padding: 10px 12px;
      font-size: 17px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.7);
      pointer-events: none;
    }
    #driver-popup .dp-title { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
    #driver-popup .dp-sparkline { margin-bottom: 8px; border-bottom: 1px solid #222222; padding-bottom: 8px; }

    /* ── Viz cursor ─────────────────────────────────────────────────── */
    #vizWrap svg { cursor: crosshair; }

    /* ── Horizontal resize handle ───────────────────────────────────── */
    .resize-handle-h {
      height: 5px;
      flex-shrink: 0;
      background: #222222;
      cursor: row-resize;
      position: relative;
      transition: background 0.15s;
    }
    .resize-handle-h:hover,
    .resize-handle-h.resizing { background: #cc0000; }
    .resize-handle-h::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 32px;
      height: 2px;
      background: #888888;
      border-radius: 1px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .resize-handle-h:hover::after,
    .resize-handle-h.resizing::after { opacity: 1; }

    /* ── Spicy analysis panel ───────────────────────────────────────── */
    #spicyPanel {
      height: 220px;
      min-height: 60px;
      flex-shrink: 0;
      background: #111111;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    #spicyPanelHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 18px;
      border-bottom: 1px solid #222222;
      flex-shrink: 0;
    }
    #spicyPanelTitle {
      font-size: 13px;
      font-weight: 600;
      color: #f5c842;
    }
    #spicyScroll {
      flex: 1;
      overflow-y: auto;
      padding: 12px 18px;
      color: #888888;
      font-size: 13px;
      line-height: 1.75;
    }
    #spicyScroll .loading { color: #444444; font-style: italic; }
    #spicyScroll .error-msg { color: #e53935; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #0d0d0d; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #333333; }

    /* ── Heatmap incident pulse ─────────────────────────────────── */
    @keyframes hm-pulse { 0%,100% { opacity:.9; } 50% { opacity:.45; } }
    .hm-inc { animation: hm-pulse 1.8s ease-in-out infinite; }

    /* ── Chart tabs ─────────────────────────────────────────────── */
    .chart-tabs { display: flex; gap: 3px; }
    .chart-tab {
      background: #1c1c1c; border: 1px solid #2a2a2a; color: #777777;
      padding: 5px 10px; font-size: 17px; font-family: inherit; cursor: pointer;
      border-radius: 5px; white-space: nowrap; transition: background 0.15s;
    }
    .chart-tab:hover { background: #252525; color: #e0e0e0; }
    .chart-tab.active { background: #1a0a0a; border-color: #cc0000; color: #e53935; }

    /* ── View toggle ─────────────────────────────────────────────── */
    .view-tabs { display: flex; gap: 3px; margin-bottom: 4px; }
    .view-tab {
      background: #1c1c1c; border: 1px solid #2a2a2a; color: #777777;
      padding: 4px 9px; font-size: 13px; font-family: inherit; cursor: pointer;
      border-radius: 4px; white-space: nowrap; transition: background 0.15s;
    }
    .view-tab:hover { background: #252525; color: #e0e0e0; }
    .view-tab.active { background: #3c1a20; border-color: #c0392b; color: #e57373; }

    /* ── Table view ──────────────────────────────────────────────── */
    #tableWrap { flex: 1; overflow: auto; display: none; }
    .timing-table { border-collapse: collapse; font-size: 13px; white-space: nowrap; }
    .timing-table th {
      background: #111111; padding: 4px 8px; color: #555555; font-weight: 600;
      position: sticky; top: 0; z-index: 1; border-bottom: 1px solid #222222;
      text-align: center;
    }
    .timing-driver-col {
      position: sticky; left: 0; z-index: 2; min-width: 130px; padding: 4px 8px;
      border-right: 1px solid #222222; font-weight: 500; text-align: left;
      background: #0d0d0d;
    }
    th.timing-driver-col { z-index: 3; background: #111111; }
    .timing-table td {
      padding: 3px 7px; border-bottom: 1px solid #111111;
      text-align: center; color: #666666;
    }
    .timing-table tbody tr:hover td { background: #111111; }
    .timing-fl  { background: #0a2a15 !important; color: #4caf50 !important; font-weight: 600; }
    .timing-pb  { background: #2a2800 !important; color: #f5c842 !important; }
    .timing-inc { background: #1a0808 !important; color: #e53935 !important; }
    .timing-cur { box-shadow: inset 2px 0 0 #e53935, inset -2px 0 0 #e53935; }

    /* ── Sparkline ───────────────────────────────────────────────── */
    .sparkline { display: block; margin-top: 3px; }

    /* ── Compact driver rows (cards collapsed) ───────────────────── */
    .compact-driver-row {
      display: flex; align-items: center; gap: 8px; padding: 4px 6px;
      border-radius: 6px; cursor: pointer; transition: background 0.1s;
    }
    .compact-driver-row:hover { background: #1a1a1a; }
    .compact-pos-name { font-size: 17px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }

    /* ── Fastest Laps Board ──────────────────────────────────────── */
    #fastestLapsArea { padding-top: 4px; }
    .fl-section-title {
      font-size: 11px; font-weight: 600; color: #555555;
      text-transform: uppercase; letter-spacing: 1.5px; padding: 0 2px 8px;
    }
    .fl-row { margin-bottom: 8px; }
    .fl-row-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
    .fl-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
    .fl-time { font-size: 13px; font-variant-numeric: tabular-nums; flex-shrink: 0; }
    .fl-bar-track { height: 4px; background: #1a1a1a; border-radius: 2px; }
    .fl-bar-fill  { height: 100%; border-radius: 2px; transition: width 0.15s; }

    /* ── Event summary grid ──────────────────────────────────────── */
    .event-summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px; padding: 4px;
    }
    .event-heat-card {
      background: #0a0a0a; border: 1px solid #222222; border-radius: 9px;
      padding: 12px; cursor: pointer; transition: border-color 0.15s, background 0.15s;
    }
    .event-heat-card:hover { background: #1a1a1a; border-color: #cc0000; }
    .ehc-name { font-size: 17px; font-weight: 600; color: #c0c0c0; margin-bottom: 6px; line-height: 1.3; }
    .ehc-badge {
      display: inline-block; background: #1a1a1a; border-radius: 4px;
      padding: 2px 6px; font-size: 11px; color: #555555; margin-right: 4px;
    }
  </style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────── -->
<div id="header">
  <div class="sss-wrap">
    <button class="btn" id="sssBtn" onclick="toggleSSSDropdown()">🏁 Smallscale Speedway ▾</button>
    <div id="sssDropdown"></div>
  </div>
  <input type="text" id="eventUrl" placeholder="Event URL  (view_event&id=…)" />
  <button class="btn" onclick="loadEvent()">Load Race Night</button>
  <span class="sep">|</span>
  <input type="text" id="raceUrl" placeholder="Single Race URL  (view_race_result&id=…)" />
  <button class="btn" onclick="loadSingleRace()">Load Single Race</button>
  <span class="sep">|</span>
  <button class="btn btn-primary" id="playBtn" onclick="togglePlay()" disabled>▶ Play</button>
  <div class="speed-wrap">
    Speed <input type="range" id="speedSlider" min="1" max="15" value="5">
    <span id="speedVal">5</span>
  </div>
  <span class="sep">|</span>
  <input type="password" id="apiKeyInput" placeholder="Gemini API Key" />
</div>

<!-- ── Main ───────────────────────────────────────────────────── -->
<div id="main">

  <!-- Left sidebar -->
  <div id="sidebar-left" style="width:190px">
    <h3>Race Night</h3>
    <div id="heatList">
      <div class="empty-state" style="height:auto;padding:20px 0;font-size:13px;color:#444;">
        No event loaded
      </div>
    </div>
  </div>

  <div class="resize-handle" id="rh-left"></div>

  <!-- Center -->
  <div id="center">
    <div id="race-header">
      <div>
        <div id="raceTitle">—</div>
        <div id="raceSub">Load an event or single race above</div>
      </div>
      <div id="raceControls" style="display:none;flex-direction:column;gap:3px;align-items:center">
        <div id="viewToggle" class="view-tabs">
          <button class="view-tab active" onclick="setViewMode('chart')">Chart</button>
          <button class="view-tab" onclick="setViewMode('table')">Table</button>
        </div>
        <div id="chartTabs" class="chart-tabs">
          <button class="chart-tab active" onclick="setChartMode('position')">Position</button>
          <button class="chart-tab" onclick="setChartMode('laptime')">Lap Times</button>
          <button class="chart-tab" onclick="setChartMode('gap')">Gap</button>
          <button class="chart-tab" onclick="setChartMode('pace')">Pace</button>
          <button class="chart-tab" onclick="setChartMode('heatmap')">Heat Map</button>
        </div>
      </div>
      <div style="text-align:right">
        <div id="lapCounter">—</div>
        <div id="raceTime"></div>
      </div>
    </div>
    <div id="scrubberWrap">
      <div id="scrubberTrack">
        <div id="scrubberFill"></div>
        <div id="scrubberThumb"></div>
      </div>
    </div>
    <div id="vizWrap">
      <div id="vizArea">
        <div class="empty-state">
          <div class="icon">🏁</div>
          <div>Paste a LiveRC results URL above to get started</div>
          <div style="color:#2a2a2a;font-size:10px;margin-top:4px">Works with any liverc.com subdomain</div>
        </div>
      </div>
    </div>
    <div id="tableWrap"></div>
    <div class="resize-handle-h" id="rh-spicy" style="display:none"></div>
    <div id="spicyPanel">
      <div id="spicyPanelHeader">
        <div id="spicyPanelTitle">🔥 Spicy Analysis</div>
        <button class="btn" style="font-size:13px;padding:4px 10px" onclick="generateSpicyAnalysis()">Regenerate</button>
      </div>
      <div id="spicyScroll">
        <div id="spicyArea"></div>
      </div>
    </div>
  </div>

  <div class="resize-handle" id="rh-right"></div>

  <!-- Right sidebar -->
  <div id="sidebar-right" style="width:225px">
    <div id="statsHeader" style="display:none;padding:4px 2px 4px">
      <span style="font-size:10px;font-weight:600;color:#555555;text-transform:uppercase;letter-spacing:1.5px">Drivers</span>
    </div>
    <div id="statsArea"></div>
    <div id="sparklineHint" style="display:none;font-size:10px;color:#555555;font-style:italic;padding:2px 4px 10px;line-height:1.5">
      lap times &nbsp;·&nbsp; <span style="color:#c03030">●</span> incident
    </div>
    <div id="fastestLapsArea"></div>
  </div>

</div>
<div id="tooltip"></div>
<div id="driver-popup"></div>

<script>
// ═══════════════════════════════════════════════════════════════
//  Constants
// ═══════════════════════════════════════════════════════════════
const INCIDENT_THRESHOLD_MS = 2000;
const FLOOR_FILTER_MS       = 4600;
const VIZ_ML  = 30;   // left margin  (position labels)
const VIZ_MR  = 140;  // right margin (driver name labels)
const VIZ_MT  = 16;   // top margin
const VIZ_MB  = 30;   // bottom margin (lap number labels)
const DRIVER_COLORS = ['#f0c040','#7ab8f5','#d04040','#40c080','#c870d8','#f09040','#60d8d8','#f06090'];

// ═══════════════════════════════════════════════════════════════
//  Application State
// ═══════════════════════════════════════════════════════════════
let currentEvent      = null;   // { eventName, baseUrl, heats: [{raceId, label}] }
let currentHeat       = null;   // parsed + incident-enriched race data
let leaderLap         = 0;
let maxLeaderLap      = 0;
let playTimer         = null;
let isPlaying         = false;
let highlightedDriver = null;   // driver name string, or null
let chartMode         = 'position';  // 'position' | 'laptime' | 'gap' | 'pace'
let viewMode          = 'chart';     // 'chart' | 'table'

// ═══════════════════════════════════════════════════════════════
//  UI Helpers
// ═══════════════════════════════════════════════════════════════
document.getElementById('speedSlider').addEventListener('input', function () {
  document.getElementById('speedVal').textContent = this.value;
  if (isPlaying) {
    clearInterval(playTimer);
    playTimer = setInterval(tickAnimation, tickInterval());
  }
});

// Gemini API key — loaded from proxy /env, then localStorage, then manual paste
document.getElementById('apiKeyInput').value = localStorage.getItem('rc_gemini_key') || '';
document.getElementById('apiKeyInput').addEventListener('blur', () => {
  const v = document.getElementById('apiKeyInput').value.trim();
  if (v) localStorage.setItem('rc_gemini_key', v);
});

function tickInterval() {
  const spd = parseInt(document.getElementById('speedSlider').value) || 5;
  return Math.max(50, Math.round(1000 / spd));
}

function getApiKey() {
  return document.getElementById('apiKeyInput').value.trim()
      || localStorage.getItem('rc_gemini_key')
      || '';
}

// ═══════════════════════════════════════════════════════════════
//  SSS Home Track Dropdown
// ═══════════════════════════════════════════════════════════════
let _sssCacheHtml = null;
let _sssCacheTime = 0;
const SSS_EVENTS_URL = 'https://ssspeedway.liverc.com/events/';
const SSS_BASE_URL   = 'https://ssspeedway.liverc.com';
const SSS_CACHE_MS   = 5 * 60 * 1000;
const SSS_DAYS_MS    = 7 * 24 * 60 * 60 * 1000;

async function loadSSSEvents() {
  const drop = document.getElementById('sssDropdown');
  drop.innerHTML = '<div class="sss-status">Loading…</div>';

  try {
    if (!_sssCacheHtml || Date.now() - _sssCacheTime > SSS_CACHE_MS) {
      _sssCacheHtml = await fetchLiverc(SSS_EVENTS_URL);
      _sssCacheTime = Date.now();
    }

    const doc = new DOMParser().parseFromString(_sssCacheHtml, 'text/html');
    const rows = [...doc.querySelectorAll('#events tbody tr')];
    const cutoff = Date.now() - SSS_DAYS_MS;

    const recent = rows.map(tr => {
      const tds = tr.querySelectorAll('td');
      if (tds.length < 3) return null;
      const a = tds[0].querySelector('a');
      if (!a) return null;
      const dateStr = tds[1].querySelector('span.hidden')?.textContent?.trim();
      if (!dateStr) return null;
      const date = new Date(dateStr);
      if (isNaN(date) || date.getTime() < cutoff) return null;
      return {
        name:  a.textContent.trim(),
        url:   SSS_BASE_URL + a.getAttribute('href'),
        heats: tds[2].textContent.trim(),
        label: date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
      };
    }).filter(Boolean);

    if (!recent.length) {
      drop.innerHTML = '<div class="sss-status">No events in the last 7 days</div>';
      return;
    }

    drop.innerHTML = recent.map(e =>
      `<div class="sss-item" onclick="pickSSSEvent('${e.url.replace(/'/g,"\\'")}')">
        <span>${e.label} · ${e.name}</span>
        <span class="sss-heats">${e.heats} heats</span>
      </div>`
    ).join('');

  } catch {
    drop.innerHTML = '<div class="sss-status">Could not load events</div>';
  }
}

function toggleSSSDropdown() {
  const drop = document.getElementById('sssDropdown');
  const isOpen = drop.classList.contains('open');
  drop.classList.toggle('open', !isOpen);
  if (!isOpen) loadSSSEvents();
}

function pickSSSEvent(url) {
  document.getElementById('eventUrl').value = url;
  document.getElementById('sssDropdown').classList.remove('open');
  loadEvent();
}

document.addEventListener('click', e => {
  if (!e.target.closest('.sss-wrap')) {
    document.getElementById('sssDropdown').classList.remove('open');
  }
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('sssDropdown').classList.remove('open');
  }
});

function msToStr(ms) {
  if (ms == null || isNaN(ms)) return '—';
  const s = ms / 1000;
  if (s < 60) return s.toFixed(3) + 's';
  const m = Math.floor(s / 60);
  return `${m}:${(s % 60).toFixed(3).padStart(6, '0')}`;
}

// ═══════════════════════════════════════════════════════════════
//  Fetch  (local proxy first, then external fallbacks)
// ═══════════════════════════════════════════════════════════════
async function fetchLiverc(url) {
  const enc = encodeURIComponent(url);
  const proxies = [
    `/proxy?url=${enc}`,                                     // local proxy.mjs (best)
    `https://api.allorigins.win/raw?url=${enc}`,            // external fallback 1
    `https://corsproxy.io/?url=${enc}`,                     // external fallback 2
  ];
  let lastErr;
  for (const proxyUrl of proxies) {
    try {
      const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(12000) });
      if (res.ok) return res.text();
      lastErr = new Error(`HTTP ${res.status} from ${proxyUrl}`);
    } catch (e) {
      lastErr = e;
    }
  }
  throw new Error(`All proxies failed — try running: node proxy.mjs\n(${lastErr?.message})`);
}

// ═══════════════════════════════════════════════════════════════
//  Parse helpers (mirroring scraper.mjs)
// ═══════════════════════════════════════════════════════════════
function parseStatFloat(str) {
  const m = (str || '').match(/\d+\.\d{3}/);
  return m ? parseFloat(m[0]) : null;
}

function totalTimeToMs(str) {
  if (!str) return null;
  str = str.trim();
  const mm = str.match(/^(\d+):(\d+\.\d+)$/);
  if (mm) return Math.round((parseInt(mm[1]) * 60 + parseFloat(mm[2])) * 1000);
  const v = parseFloat(str);
  return isNaN(v) ? null : Math.round(v * 1000);
}

// ═══════════════════════════════════════════════════════════════
//  Parse event page  →  heat list
// ═══════════════════════════════════════════════════════════════
function parseEventPage(html, baseUrl) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const heats = [];
  const seen  = new Set();

  doc.querySelectorAll('a').forEach(a => {
    const href = a.getAttribute('href') || '';
    if (!href.includes('view_race_result')) return;
    const m = href.match(/id=(\d+)/);
    if (!m || seen.has(m[1])) return;
    seen.add(m[1]);
    heats.push({ raceId: m[1], label: a.textContent.trim() });
  });

  const titleParts = (doc.querySelector('title')?.textContent || '').split('::').map(s => s.trim());
  // "Small Scale Speedway :: Tuesday Club Race :: LiveRC" → index 1
  const eventName = titleParts.length >= 2 ? titleParts[1] : (titleParts[0] || 'Race Night');

  return { eventName, baseUrl, heats };
}

// ═══════════════════════════════════════════════════════════════
//  Parse race result page  →  results + per-lap times
// ═══════════════════════════════════════════════════════════════
function parseRacePage(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');

  // Title: "SSS :: Tuesday Club Race :: Box Stock A-Main :: LiveRC"
  const rawTitle = doc.querySelector('title')?.textContent || '';
  const parts = rawTitle.split('::').map(s => s.trim()).filter(s => s && s !== 'LiveRC');
  let className = 'Unknown';
  let heatName  = 'Unknown';
  if (parts.length >= 1) {
    const last = parts[parts.length - 1];
    const hm = last.match(/^(.+?)\s+\(?([A-D]\d*-?Main|Heat\s*\d+(?:\/\d+)?|Qualifier\s*\d*|Semi.*?Final|Final)\)?$/i);
    if (hm) {
      className = hm[1].trim();
      heatName  = hm[2].trim();
    } else {
      className = last;
      heatName  = '';
    }
  }

  // Results table
  // Cols: [0]Pos [1]"Qual# Name View Laps" [2]Qual# [3]"Laps/Time"
  //       [4]Behind [5]Fastest Lap [6]Avg Lap [7]Avg Top 5 … [12]Consistency
  const results = [];
  doc.querySelectorAll('table tr').forEach(row => {
    const cells = row.querySelectorAll('td');
    if (cells.length < 5) return;

    const pos = parseInt(cells[0].textContent.trim());
    if (isNaN(pos) || pos < 1 || pos > 99) return;

    const rawDriver = cells[1].textContent
      .replace(/view\s*laps/gi, '')
      .replace(/^\s*\d+\s+/, '')
      .trim()
      .toUpperCase();
    if (!rawDriver) return;

    const qualPos = parseInt(cells[2].textContent.trim()) || null;

    const lapsTimeRaw = cells[3].textContent.trim();
    let laps = null, totalTimeMs = null;
    const lt = lapsTimeRaw.match(/^(\d+)\/(.+)$/);
    if (lt) {
      laps = parseInt(lt[1]);
      totalTimeMs = totalTimeToMs(lt[2]);
    } else {
      laps = parseInt(lapsTimeRaw) || null;
    }

    const fastF = parseStatFloat(cells[5]?.textContent || '');
    const fastestLapMs = fastF ? Math.round(fastF * 1000) : null;

    const avgF = parseStatFloat(cells[6]?.textContent || '');
    const avgLapMs = avgF ? Math.round(avgF * 1000) : null;

    // Consistency: col 12, expressed as a % string like "87.5" or "87.5%"
    const rawCons = (cells[12]?.textContent || '').trim().replace('%', '');
    const consistencyPct = parseFloat(rawCons) || null;

    results.push({
      position: pos, driverName: rawDriver,
      qualPos, laps, totalTimeMs, fastestLapMs, avgLapMs, consistencyPct,
      lapTimes: [], lapMeta: [],
      incidentCount: 0, incidentRate: 0, topAvgMs: null,
    });
  });

  // Per-lap times embedded in the page as:
  // racerLaps[N] = { 'driverName': '...', 'laps': [{'lapNum':1,'time':'11.185',...}, ...] }
  const lapMap = {};
  html.split('racerLaps[').slice(1).forEach(block => {
    const nm = block.match(/'driverName'\s*:\s*'([^']+)'/);
    if (!nm) return;
    const driver = nm[1].toUpperCase();
    const lapsStart = block.indexOf("'laps'");
    if (lapsStart === -1) return;
    const times = [];
    for (const m of block.slice(lapsStart).matchAll(/'time'\s*:\s*'([\d.]+)'/g)) {
      const t = parseFloat(m[1]);
      if (!isNaN(t) && t > 0) times.push(Math.round(t * 1000));
    }
    if (times.length) lapMap[driver] = times;
  });

  for (const r of results) {
    r.lapTimes = lapMap[r.driverName] || [];
  }

  return { className, heatName, results };
}

// ═══════════════════════════════════════════════════════════════
//  Incident computation  (matches scraper.mjs algorithm exactly)
// ═══════════════════════════════════════════════════════════════
function computeIncidents(results) {
  // Step 1: collect all laps, apply floor filter
  const allLaps = results.flatMap(r => r.lapTimes.map(t => ({ driver: r.driverName, t })));
  const floored = allLaps.filter(l => l.t >= FLOOR_FILTER_MS);
  if (!floored.length) return;

  // Step 2: heat-wide average for ceiling filter
  const heatAvg = floored.reduce((s, l) => s + l.t, 0) / floored.length;
  const ceiling = 3 * heatAvg;

  // Step 3: per-driver valid laps
  const validByDriver = new Map();
  for (const l of floored) {
    if (l.t <= ceiling) {
      if (!validByDriver.has(l.driver)) validByDriver.set(l.driver, []);
      validByDriver.get(l.driver).push(l.t);
    }
  }

  // Step 4: per-driver top-5 avg + incident tagging
  for (const r of results) {
    const valid = validByDriver.get(r.driverName) || [];
    if (valid.length < 3) {
      r.lapMeta = r.lapTimes.map(t => ({
        type: t < FLOOR_FILTER_MS ? 'floor' : t > ceiling ? 'ceil' : 'clean',
        delta: 0,
      }));
      continue;
    }

    const sorted  = [...valid].sort((a, b) => a - b);
    const top5    = sorted.slice(0, Math.min(5, sorted.length));
    const topAvg  = top5.reduce((s, t) => s + t, 0) / top5.length;
    r.topAvgMs    = topAvg;

    let cnt = 0;
    r.lapMeta = r.lapTimes.map(t => {
      if (t < FLOOR_FILTER_MS) return { type: 'floor', delta: 0 };
      if (t > ceiling)         return { type: 'ceil',  delta: 0 };
      const delta = t - (topAvg + INCIDENT_THRESHOLD_MS);
      if (delta > 0) { cnt++; return { type: 'incident', delta }; }
      return { type: 'clean', delta: 0 };
    });
    r.incidentCount = cnt;
    r.incidentRate  = cnt / valid.length;
  }
}

// ═══════════════════════════════════════════════════════════════
//  Color helpers
// ═══════════════════════════════════════════════════════════════
function incidentFill(delta) {
  if (delta < 500)  return '#e8c200';
  if (delta < 1500) return '#e87000';
  if (delta < 3500) return '#d43000';
  return '#b01020';
}

// ═══════════════════════════════════════════════════════════════
//  Star polygon helper  (for fastest-lap marker)
// ═══════════════════════════════════════════════════════════════
function starPoints(cx, cy, outerR, innerR) {
  const pts = [];
  for (let i = 0; i < 10; i++) {
    const angle = (i * Math.PI / 5) - Math.PI / 2;
    const r = i % 2 === 0 ? outerR : innerR;
    pts.push(`${(cx + r * Math.cos(angle)).toFixed(1)},${(cy + r * Math.sin(angle)).toFixed(1)}`);
  }
  return pts.join(' ');
}

// ═══════════════════════════════════════════════════════════════
//  Position-by-lap computation
//  Returns posMap[driverName] = [pos_at_lap0, pos_at_lap1, ...]
//  lap 0 = grid (qualPos order), lap N = rank by cumulative time
// ═══════════════════════════════════════════════════════════════
function computePositionsByLap(results) {
  const maxLap = Math.max(...results.map(r => r.lapTimes.length));
  const posMap = {};

  // Lap 0: starting grid order by qualPos
  const grid = [...results].sort((a, b) => (a.qualPos ?? 99) - (b.qualPos ?? 99));
  grid.forEach((r, i) => { posMap[r.driverName] = [i + 1]; });

  for (let lap = 1; lap <= maxLap; lap++) {
    const ranked = results
      .map(r => ({
        name: r.driverName,
        cum: r.lapTimes.length >= lap
          ? r.lapTimes.slice(0, lap).reduce((a, b) => a + b, 0)
          : Infinity,
        lapsComplete: Math.min(r.lapTimes.length, lap),
      }))
      // Primary: more laps = better. Secondary: lower cumulative time = better.
      .sort((a, b) => b.lapsComplete - a.lapsComplete || a.cum - b.cum);

    ranked.forEach((d, i) => { posMap[d.name].push(i + 1); });
  }

  return { posMap, maxLap };
}

// ═══════════════════════════════════════════════════════════════
//  Shared race data helper  — cumulative times + gap to leader
// ═══════════════════════════════════════════════════════════════
function computeRaceData(results, maxLap) {
  const driverCumAt = {};
  for (const r of results) {
    driverCumAt[r.driverName] = [null];
    for (let l = 1; l <= r.lapTimes.length; l++) {
      driverCumAt[r.driverName][l] = r.lapTimes.slice(0, l).reduce((a, b) => a + b, 0);
    }
  }
  const gapAt = {};
  for (const r of results) gapAt[r.driverName] = new Array(maxLap + 1).fill(null);
  for (let lap = 1; lap <= maxLap; lap++) {
    const completed = results.filter(r => driverCumAt[r.driverName][lap] != null);
    if (!completed.length) continue;
    const minCum = Math.min(...completed.map(r => driverCumAt[r.driverName][lap]));
    for (const r of completed) {
      gapAt[r.driverName][lap] = driverCumAt[r.driverName][lap] - minCum;
    }
  }
  return { driverCumAt, gapAt };
}

// ═══════════════════════════════════════════════════════════════
//  Position-graph Visualization  (lap-by-lap position chart)
// ═══════════════════════════════════════════════════════════════
function renderVisualization() {
  if (chartMode === 'laptime') { renderLapTimeChart();  return; }
  if (chartMode === 'gap')     { renderGapChart();      return; }
  if (chartMode === 'pace')    { renderPaceChart();     return; }
  if (chartMode === 'heatmap') { renderHeatmapChart();  return; }
  const container = document.getElementById('vizArea');

  if (!currentHeat || !currentHeat.results.length) {
    container.innerHTML = `<div class="empty-state">
      <div class="icon">🏁</div><div>Select a race from the left panel</div>
    </div>`;
    return;
  }

  const results  = currentHeat.results;
  const n        = results.length;
  const { posMap, maxLap } = currentHeat._posMap;

  const W       = Math.max(400, container.getBoundingClientRect().width || 700);
  const trackW  = W - VIZ_ML - VIZ_MR;
  const rowH    = Math.max(48, Math.min(80, Math.floor((300 - VIZ_MT - VIZ_MB) / Math.max(n - 1, 1))));
  const trackH  = (n - 1) * rowH;
  const H       = trackH + VIZ_MT + VIZ_MB;

  // Coordinate helpers
  const xAt = lap => VIZ_ML + (lap / maxLap) * trackW;
  const yAt = pos => VIZ_MT + (pos - 1) * rowH;

  // Assign stable colors by finishing position
  const sorted = [...results].sort((a, b) => a.position - b.position);
  const colorOf = {};
  sorted.forEach((r, i) => { colorOf[r.driverName] = DRIVER_COLORS[i % DRIVER_COLORS.length]; });

  const parts = [`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}">`];

  // ── Background grid ──────────────────────────────────────────
  // Horizontal position lines
  for (let p = 1; p <= n; p++) {
    const y = yAt(p);
    parts.push(`<line x1="${VIZ_ML}" y1="${y}" x2="${VIZ_ML + trackW}" y2="${y}" stroke="#1a1a1a" stroke-width="1"/>`);
    parts.push(`<text x="${VIZ_ML - 8}" y="${y + 4}" fill="#555555" font-size="12" text-anchor="end" font-family="Inter,system-ui,sans-serif" font-weight="500">${p}</text>`);
  }

  // Vertical lap tick marks (every 5 laps, always include 0 and maxLap)
  const lapStep = maxLap <= 15 ? 2 : maxLap <= 35 ? 5 : 10;
  const tickLaps = new Set([0, maxLap]);
  for (let l = lapStep; l < maxLap; l += lapStep) tickLaps.add(l);
  for (const l of [...tickLaps].sort((a, b) => a - b)) {
    const x = xAt(l);
    parts.push(`<line x1="${x}" y1="${VIZ_MT}" x2="${x}" y2="${VIZ_MT + trackH}" stroke="#1a1a1a" stroke-dasharray="2,4" stroke-width="1"/>`);
    parts.push(`<text x="${x}" y="${VIZ_MT + trackH + 16}" fill="#555555" font-size="11" text-anchor="middle" font-family="Inter,system-ui,sans-serif">${l}</text>`);
  }
  // "Laps" axis label
  parts.push(`<text x="${VIZ_ML + trackW / 2}" y="${H - 2}" fill="#444444" font-size="10" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="500">Laps</text>`);

  // ── Driver lines ─────────────────────────────────────────────
  const showThru = Math.min(leaderLap, maxLap); // draw up to this lap

  // ── Pre-compute cumulative times and gap-to-leader at each lap ──
  const { driverCumAt, gapAt } = computeRaceData(results, maxLap);

  results.forEach(driver => {
    const color = colorOf[driver.driverName];
    const dPos  = posMap[driver.driverName]; // array indexed 0..maxLap
    if (!dPos) return;

    // Build polyline through lap 0..showThru
    const pts = [];
    for (let l = 0; l <= showThru; l++) {
      if (dPos[l] == null) break;
      pts.push(`${xAt(l).toFixed(1)},${yAt(dPos[l]).toFixed(1)}`);
    }
    if (pts.length >= 2) {
      parts.push(`<polyline data-drivername="${escHtml(driver.driverName)}" points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>`);
    }

    // Dots at each lap
    for (let l = 0; l <= showThru; l++) {
      if (dPos[l] == null) break;
      const x   = xAt(l);
      const y   = yAt(dPos[l]);
      const meta = l > 0 ? (driver.lapMeta?.[l - 1] ?? { type: 'clean', delta: 0 }) : null;
      const isIncident = meta?.type === 'incident';

      const isFl = l > 0
        && driver.fastestLapMs != null
        && driver.lapTimes[l - 1] === driver.fastestLapMs
        && driver.lapTimes.indexOf(driver.fastestLapMs) === l - 1;

      // Data attrs for tooltip (lap 0 = grid, no time data)
      const lapTimeMs = l > 0 ? driver.lapTimes[l - 1] : null;
      const gapMs     = gapAt[driver.driverName][l] ?? null;
      const deltaMs   = l >= 2 && driver.lapTimes[l - 1] != null && driver.lapTimes[l - 2] != null
        ? driver.lapTimes[l - 1] - driver.lapTimes[l - 2] : null;

      const da = `data-lap="${l}" data-driver="${escHtml(driver.driverName)}" data-pos="${dPos[l]}" data-laptime="${lapTimeMs}" data-gap="${gapMs}" data-delta="${deltaMs}" data-color="${color}" data-incident="${isIncident ? 1 : 0}" data-fl="${isFl ? 1 : 0}"`;

      if (isFl) {
        // ★ Star for fastest lap
        parts.push(`<polygon points="${starPoints(x, y, 7.5, 3.2)}" fill="${color}" stroke="#f5c842" stroke-width="1.8" opacity="0.97" ${da}/>`);
      } else {
        const r = isIncident ? 5.5 : 3.5;
        const dotColor   = isIncident ? '#ff3030' : color;
        const strokeColor = isIncident ? '#ff0000' : color;
        const strokeW    = isIncident ? 1.5 : 0.8;
        // Visible dot
        parts.push(`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${r}" fill="${dotColor}" stroke="${strokeColor}" stroke-width="${strokeW}" opacity="0.95"/>`);
        // Larger transparent hit area on top carries the data attrs
        parts.push(`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="9" fill="transparent" stroke="none" style="cursor:default" ${da}/>`);
      }
    }

    // Overtake markers — upward triangle on laps where this driver gained position
    for (let l = 1; l <= showThru; l++) {
      if (dPos[l] == null || dPos[l - 1] == null) continue;
      if (dPos[l] >= dPos[l - 1]) continue;
      const gained = dPos[l - 1] - dPos[l];
      const ox = xAt(l), oy = yAt(dPos[l]);
      parts.push(`<polygon points="${ox.toFixed(1)},${(oy-14).toFixed(1)} ${(ox-5).toFixed(1)},${(oy-6).toFixed(1)} ${(ox+5).toFixed(1)},${(oy-6).toFixed(1)}" fill="${color}" opacity="0.7"/>`);
      if (gained > 1) {
        parts.push(`<text x="${ox.toFixed(1)}" y="${(oy-17).toFixed(1)}" fill="${color}" font-size="9" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="700">+${gained}</text>`);
      }
    }

    // Driver name label at the current end of line
    if (showThru > 0 && dPos[showThru] != null) {
      const ex = xAt(showThru);
      const ey = yAt(dPos[showThru]);
      const label = driver.driverName.length > 15 ? driver.driverName.slice(0, 14) + '…' : driver.driverName;
      parts.push(`<rect x="${(ex + 7).toFixed(1)}" y="${(ey - 7).toFixed(1)}" width="8" height="8" fill="${color}" rx="2"/>`);
      parts.push(`<text x="${(ex + 18).toFixed(1)}" y="${(ey + 3).toFixed(1)}" fill="${color}" font-size="12" font-family="Inter,system-ui,sans-serif" font-weight="600">${escHtml(label)}</text>`);
    }
  });

  parts.push('</svg>');
  container.className = '';
  container.innerHTML = parts.join('');
  applyHighlight();
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ═══════════════════════════════════════════════════════════════
//  Sparkline builder
// ═══════════════════════════════════════════════════════════════
function buildSparkline(driver, color) {
  const laps = driver.lapTimes;
  if (!laps.length) return '';
  const valid = laps.filter(t => t >= FLOOR_FILTER_MS);
  if (!valid.length) return '';
  const minT = Math.min(...valid), maxT = Math.max(...valid);
  const W = 80, H = 22, n = laps.length;
  const xAt = i => (n <= 1 ? W / 2 : (i / (n - 1)) * W);
  const yAt = t  => maxT === minT ? H / 2 : H - ((t - minT) / (maxT - minT)) * H;
  const pts = [], dots = [];
  laps.forEach((t, i) => {
    if (t < FLOOR_FILTER_MS) return;
    pts.push(`${xAt(i).toFixed(1)},${yAt(t).toFixed(1)}`);
    if (driver.lapMeta?.[i]?.type === 'incident') {
      dots.push(`<circle cx="${xAt(i).toFixed(1)}" cy="${yAt(t).toFixed(1)}" r="2" fill="#e53935"/>`);
    }
  });
  return `<svg class="sparkline" width="80" height="22" viewBox="0 0 80 22">${
    pts.length >= 2 ? `<polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>` : ''
  }${dots.join('')}</svg>`;
}

// ═══════════════════════════════════════════════════════════════

function renderStats() {
  const area = document.getElementById('statsArea');

  const sorted = [...currentHeat.results].sort((a, b) => a.position - b.position);
  area.innerHTML = sorted.map((driver, i) => {
    const color = DRIVER_COLORS[i % DRIVER_COLORS.length];
    const safeN = driver.driverName.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
