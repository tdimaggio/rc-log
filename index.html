    const spark = buildSparkline(driver, color);
    return `<div class="compact-driver-row${isHL ? ' highlighted' : ''}" style="--card-color:${color}"
      onmouseenter="showDriverPopup(this,'${safeN}',${i})"
      onmouseleave="hideDriverPopup()"
      onclick="toggleDriverHighlight('${safeN}')">
      <span class="compact-pos-name" style="color:${color}">P${driver.position} · ${escHtml(driver.driverName)}</span>
      ${spark}
    </div>`;
  }).join('');
}

function showDriverPopup(el, driverName, colorIdx) {
  if (!currentHeat) return;
  const driver = currentHeat.results.find(r => r.driverName === driverName);
  if (!driver) return;
  const color = DRIVER_COLORS[colorIdx % DRIVER_COLORS.length];
  const qual  = driver.qualPos != null ? `Q${driver.qualPos}` : '?';
  const net   = driver.qualPos != null ? driver.qualPos - driver.position : null;
  const posChange = net != null ? `+${Math.max(0,net)} / -${Math.max(0,-net)}` : '—';
  const consStr = driver.consistencyPct != null ? driver.consistencyPct.toFixed(1) + '%' : '—';
  const consColor = driver.consistencyPct != null
    ? (driver.consistencyPct >= 90 ? '#2ecc71' : driver.consistencyPct >= 75 ? '#f5c842' : '#e53935')
    : '#666666';
  const incColor = driver.incidentCount ? '#e53935' : '#2ecc71';

  const popup = document.getElementById('driver-popup');
  popup.style.borderColor = color;
  popup.innerHTML = `
    <div class="dp-title" style="color:${color}">P${driver.position} · ${escHtml(driver.driverName)}</div>
    <div class="dp-sparkline">${buildSparkline(driver, color)}</div>
    <div class="stat-row"><span>Grid → Finish</span><span class="v">${qual} → P${driver.position}</span></div>
    <div class="stat-row"><span>Best lap</span><span class="v">${msToStr(driver.fastestLapMs)}</span></div>
    <div class="stat-row"><span>Avg lap</span><span class="v">${msToStr(driver.avgLapMs)}</span></div>
    <div class="stat-row"><span>Consistency</span><span class="v" style="color:${consColor}">${consStr}</span></div>
    <div class="stat-row"><span>Incidents</span><span class="v" style="color:${incColor}">${driver.incidentCount} (${driver.laps ?? '?'} laps)</span></div>
    <div class="stat-row"><span>Pos changes</span><span class="v">${posChange}</span></div>`;

  popup.style.display = 'block';
  const rect = el.getBoundingClientRect();
  const ph = popup.offsetHeight;
  popup.style.right = (window.innerWidth - rect.left + 8) + 'px';
  popup.style.left  = 'auto';
  popup.style.top   = Math.max(8, Math.min(rect.top, window.innerHeight - ph - 8)) + 'px';
}

function hideDriverPopup() {
  document.getElementById('driver-popup').style.display = 'none';
}

// ═══════════════════════════════════════════════════════════════
//  Consistency Board
// ═══════════════════════════════════════════════════════════════
function renderConsistency() {
  const area = document.getElementById('fastestLapsArea');
  if (!currentHeat) { area.innerHTML = ''; return; }

  const results = currentHeat.results;
  const sorted  = [...results].sort((a, b) => a.position - b.position);
  const colorOf = {};
  sorted.forEach((r, i) => { colorOf[r.driverName] = DRIVER_COLORS[i % DRIVER_COLORS.length]; });

  // Use liverc's consistencyPct if available; otherwise compute from clean lap std dev
  const withCons = results.map(r => {
    let pct = r.consistencyPct;
    if (pct == null && r.topAvgMs != null) {
      // Fallback: coefficient of variation → consistency %
      const cleanLaps = r.lapTimes.filter((t, i) => r.lapMeta?.[i]?.type === 'clean');
      if (cleanLaps.length >= 3) {
        const mean = cleanLaps.reduce((a, b) => a + b, 0) / cleanLaps.length;
        const variance = cleanLaps.reduce((s, t) => s + (t - mean) ** 2, 0) / cleanLaps.length;
        const cv = Math.sqrt(variance) / mean;
        pct = Math.max(0, Math.min(100, (1 - cv * 5) * 100));
      }
    }
    return { ...r, displayPct: pct };
  }).sort((a, b) => (b.displayPct ?? -1) - (a.displayPct ?? -1));

  const maxPct = Math.max(...withCons.map(d => d.displayPct ?? 0), 1);
  const hasAnyData = withCons.some(d => d.displayPct != null);

  let html = `<div style="border-top:1px solid #222222;margin-top:10px;padding-top:10px">
    <div class="fl-section-title">Consistency ${hasAnyData ? '' : '<span style="color:#444444;font-size:10px;font-weight:400">(no data)</span>'}</div>`;

  for (const d of withCons) {
    const color = colorOf[d.driverName];
    const pct   = d.displayPct;
    const barW  = pct != null ? (pct / 100 * 100).toFixed(1) : 0;
    const consColor = pct != null
      ? (pct >= 90 ? '#2ecc71' : pct >= 75 ? '#f5c842' : '#e53935')
      : '#444444';
    const label = d.driverName.length > 14 ? d.driverName.slice(0, 13) + '…' : d.driverName;
    html += `<div class="fl-row">
      <div class="fl-row-header">
        <span class="fl-name" style="color:${color}">${escHtml(label)}</span>
        <span class="fl-time" style="color:${consColor}">${pct != null ? pct.toFixed(1) + '%' : '—'}</span>
      </div>
      <div class="fl-bar-track">
        <div class="fl-bar-fill" style="width:${barW}%;background:${consColor}"></div>
      </div>
    </div>`;
  }

  html += '</div>';
  area.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
//  Spicy Analysis  (Claude API)
// ═══════════════════════════════════════════════════════════════
async function generateSpicyAnalysis() {
  const area = document.getElementById('spicyArea');
  const key  = getApiKey();

  if (!key || !currentHeat) {
    area.innerHTML = `<span class="loading">Enter your Anthropic API key in the header to generate commentary.</span>`;
    return;
  }

  const { results, className, heatName } = currentHeat;
  const sorted = [...results].sort((a, b) => a.position - b.position);

  const winner = sorted[0];
  const flDriver = sorted.reduce((best, d) =>
    (d.fastestLapMs && (!best.fastestLapMs || d.fastestLapMs < best.fastestLapMs)) ? d : best, sorted[0]);

  const summary = sorted.map(d => {
    const gapMs = d.totalTimeMs && winner.totalTimeMs ? d.totalTimeMs - winner.totalTimeMs : null;
    const gapStr = gapMs != null && gapMs > 0 ? ` (+${msToStr(gapMs)} behind)` : gapMs === 0 ? ' (winner)' : '';
    const qual = d.qualPos != null ? `started P${d.qualPos}` : 'grid unknown';
    const moved = d.qualPos != null ? (d.qualPos - d.position) : null;
    const moveStr = moved != null ? (moved > 0 ? ` gained ${moved} pos` : moved < 0 ? ` lost ${Math.abs(moved)} pos` : ' held position') : '';
    return `P${d.position} ${d.driverName}: ${d.laps ?? '?'} laps${gapStr}, best ${msToStr(d.fastestLapMs)}, avg ${msToStr(d.avgLapMs)}, ${d.incidentCount} incident${d.incidentCount !== 1 ? 's' : ''}, ${qual}${moveStr}`;
  }).join('\n');

  area.innerHTML = `<span class="loading">Generating commentary…</span>`;

  try {
    const prompt = `You are a savage, funny pit-lane commentator for local RC car club racing. Roast these results with real personality. Rules:
- Quote actual lap times and gaps (e.g. "a 9.944s best lap", "+12 seconds back")
- Name every driver — no "a driver" or "one competitor"
- If someone had incidents, name them and the count — make it hurt
- Mention who held the fastest lap and by how much
- Mention any positions gained or lost from the grid
- Be specific, irreverent, and funny. No corporate fluff.
- 4–6 sentences max.

Race: ${className}${heatName ? ' — ' + heatName : ''}
Fastest lap of the race: ${flDriver.driverName} — ${msToStr(flDriver.fastestLapMs)}
Winner's total time: ${msToStr(winner.totalTimeMs)}

Results:
${summary}`;

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${encodeURIComponent(key)}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
        }),
      }
    );

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const candidate = data.candidates[0];
    let text = candidate.content.parts.map(p => p.text).join('');
    if (candidate.finishReason === 'MAX_TOKENS') text += '…';
    // Render markdown bold/italic, then newlines
    area.innerHTML = escHtml(text)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*([^*]+?)\*/g, '<em>$1</em>')
      .replace(/\n/g, '<br>');
  } catch (err) {
    area.innerHTML = `<span class="error-msg">Error: ${escHtml(err.message)}</span>`;
  }
}

// ═══════════════════════════════════════════════════════════════
//  Animation
// ═══════════════════════════════════════════════════════════════
function togglePlay() {
  if (isPlaying) {
    clearInterval(playTimer);
    isPlaying = false;
    document.getElementById('playBtn').textContent = '▶ Play';
  } else {
    // Restart from beginning if at end
    if (leaderLap >= maxLeaderLap) leaderLap = 0;
    isPlaying = true;
    document.getElementById('playBtn').textContent = '⏸ Pause';
    playTimer = setInterval(tickAnimation, tickInterval());
  }
}

function tickAnimation() {
  if (leaderLap < maxLeaderLap) {
    leaderLap++;
    updateHeader();
    if (viewMode === 'table') renderTable(); else renderVisualization();
    updateScrubber();
  } else {
    clearInterval(playTimer);
    isPlaying = false;
    document.getElementById('playBtn').textContent = '▶ Play';
  }
}

function updateHeader() {
  const el = document.getElementById('lapCounter');
  el.textContent = currentHeat
    ? `Leader Lap ${leaderLap} / ${maxLeaderLap}`
    : '—';
}

// ── Scrub to a specific lap ──────────────────────────────────────
function scrubToLap(lap) {
  if (!currentHeat) return;
  leaderLap = Math.max(0, Math.min(lap, maxLeaderLap));
  updateHeader();
  if (viewMode === 'table') renderTable(); else renderVisualization();
  updateScrubber();
}

// ── Scrubber bar sync ────────────────────────────────────────────
function updateScrubber() {
  const wrap = document.getElementById('scrubberWrap');
  if (!currentHeat) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  const pct = maxLeaderLap > 0 ? (leaderLap / maxLeaderLap) * 100 : 0;
  document.getElementById('scrubberFill').style.width = pct + '%';
  document.getElementById('scrubberThumb').style.left = pct + '%';
}

// ── Chart mode ───────────────────────────────────────────────────
function setChartMode(mode) {
  chartMode = mode;
  document.querySelectorAll('.chart-tab').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('onclick').includes(`'${mode}'`));
  });
  renderVisualization();
}

// ── View mode ────────────────────────────────────────────────────
function setViewMode(mode) {
  viewMode = mode;
  document.querySelectorAll('.view-tab').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('onclick').includes(`'${mode}'`));
  });
  const isChart = mode === 'chart';
  document.getElementById('vizWrap').style.display   = isChart ? '' : 'none';
  document.getElementById('tableWrap').style.display = isChart ? 'none' : 'block';
  document.getElementById('chartTabs').style.display = isChart ? '' : 'none';
  if (isChart) renderVisualization(); else renderTable();
}

// ── Driver highlight ─────────────────────────────────────────────
function toggleDriverHighlight(name) {
  highlightedDriver = highlightedDriver === name ? null : name;
  applyHighlight();
  renderStats();
}

function applyHighlight() {
  const svg = document.querySelector('#vizArea svg');
  if (!svg) return;
  if (!highlightedDriver) {
    svg.querySelectorAll('[data-drivername], [data-driver]').forEach(el => { el.style.opacity = ''; });
    return;
  }
  svg.querySelectorAll('[data-drivername]').forEach(el => {
    el.style.opacity = el.dataset.drivername === highlightedDriver ? '1' : '0.1';
  });
  svg.querySelectorAll('[data-driver]').forEach(el => {
    el.style.opacity = el.dataset.driver === highlightedDriver ? '1' : '0.1';
  });
  // Bring highlighted polyline to front
  const front = svg.querySelector(`[data-drivername="${CSS.escape(highlightedDriver)}"]`);
  if (front) svg.appendChild(front);
}

// ── Shareable URL hash ───────────────────────────────────────────
function pushUrlHash() {
  const event = document.getElementById('eventUrl').value.trim();
  const race  = document.getElementById('raceUrl').value.trim();
  const parts = [];
  if (event) parts.push('event=' + encodeURIComponent(event));
  if (race)  parts.push('race='  + encodeURIComponent(race));
  history.replaceState(null, '', parts.length ? '#' + parts.join('&') : location.pathname);
}

function readUrlHash() {
  const hash = location.hash.slice(1);
  if (!hash) return;
  const params = Object.fromEntries(hash.split('&').map(p => {
    const eq = p.indexOf('=');
    return [p.slice(0, eq), decodeURIComponent(p.slice(eq + 1))];
  }));
  if (params.event) document.getElementById('eventUrl').value = params.event;
  if (params.race)  document.getElementById('raceUrl').value  = params.race;
}

// ═══════════════════════════════════════════════════════════════
//  Lap Time Chart  (second chart mode)
// ═══════════════════════════════════════════════════════════════
function renderLapTimeChart() {
  const container = document.getElementById('vizArea');
  if (!currentHeat || !currentHeat.results.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">📊</div><div>Select a race from the left panel</div></div>`;
    return;
  }

  const results = currentHeat.results;
  const allTimes = results.flatMap(r => r.lapTimes.filter(t => t >= FLOOR_FILTER_MS));
  if (!allTimes.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">📊</div><div>No lap time data available</div></div>`;
    return;
  }

  const minMs   = Math.min(...allTimes) * 0.97;
  const maxMs   = Math.max(...allTimes) * 1.03;
  const maxLap  = Math.max(...results.map(r => r.lapTimes.length));
  const W       = Math.max(400, container.getBoundingClientRect().width || 700);
  const trackW  = W - VIZ_ML - VIZ_MR;
  const trackH  = Math.max(220, Math.min(320, Math.floor((window.innerHeight - 200) * 0.45)));
  const H       = trackH + VIZ_MT + VIZ_MB;

  const xAt = lap => VIZ_ML + ((lap - 1) / Math.max(maxLap - 1, 1)) * trackW;
  const yAt = ms  => VIZ_MT + ((ms - minMs) / (maxMs - minMs)) * trackH;

  const sorted = [...results].sort((a, b) => a.position - b.position);
  const colorOf = {};
  sorted.forEach((r, i) => { colorOf[r.driverName] = DRIVER_COLORS[i % DRIVER_COLORS.length]; });

  const showThru = Math.min(leaderLap, maxLap);
  const parts = [`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}">`];

  // Y-axis grid lines (nice 500ms intervals)
  const step = Math.ceil((maxMs - minMs) / 5 / 500) * 500 || 1000;
  const firstGrid = Math.ceil(minMs / step) * step;
  for (let t = firstGrid; t <= maxMs; t += step) {
    const y = yAt(t);
    parts.push(`<line x1="${VIZ_ML}" y1="${y.toFixed(1)}" x2="${VIZ_ML + trackW}" y2="${y.toFixed(1)}" stroke="#1a1a1a" stroke-width="1"/>`);
    parts.push(`<text x="${VIZ_ML - 6}" y="${(y + 4).toFixed(1)}" fill="#555555" font-size="11" text-anchor="end" font-family="Inter,system-ui,sans-serif">${msToStr(t)}</text>`);
  }

  // X-axis lap ticks
  const lapStep = maxLap <= 15 ? 2 : maxLap <= 35 ? 5 : 10;
  const tickLaps = new Set([1, maxLap]);
  for (let l = lapStep; l < maxLap; l += lapStep) tickLaps.add(l);
  for (const l of [...tickLaps].sort((a, b) => a - b)) {
    const x = xAt(l);
    parts.push(`<line x1="${x.toFixed(1)}" y1="${VIZ_MT}" x2="${x.toFixed(1)}" y2="${VIZ_MT + trackH}" stroke="#1a1a1a" stroke-dasharray="2,4" stroke-width="1"/>`);
    parts.push(`<text x="${x.toFixed(1)}" y="${VIZ_MT + trackH + 16}" fill="#555555" font-size="11" text-anchor="middle" font-family="Inter,system-ui,sans-serif">${l}</text>`);
  }
  parts.push(`<text x="${VIZ_ML + trackW / 2}" y="${H - 2}" fill="#444444" font-size="10" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="500">Laps</text>`);

  // Driver lines + dots
  results.forEach(driver => {
    const color = colorOf[driver.driverName];
    const pts = [];
    for (let l = 1; l <= Math.min(showThru, driver.lapTimes.length); l++) {
      const t = driver.lapTimes[l - 1];
      if (t >= FLOOR_FILTER_MS) pts.push(`${xAt(l).toFixed(1)},${yAt(t).toFixed(1)}`);
    }
    if (pts.length >= 2) {
      parts.push(`<polyline data-drivername="${escHtml(driver.driverName)}" points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>`);
    }

    for (let l = 1; l <= Math.min(showThru, driver.lapTimes.length); l++) {
      const t = driver.lapTimes[l - 1];
      if (t < FLOOR_FILTER_MS) continue;
      const x = xAt(l), y = yAt(t);
      const meta = driver.lapMeta?.[l - 1] ?? { type: 'clean', delta: 0 };
      const isIncident = meta.type === 'incident';
      const isFl = driver.fastestLapMs != null && t === driver.fastestLapMs && driver.lapTimes.indexOf(t) === l - 1;
      const deltaMs = l >= 2 && driver.lapTimes[l - 2] != null ? t - driver.lapTimes[l - 2] : null;
      const da = `data-lap="${l}" data-driver="${escHtml(driver.driverName)}" data-pos="${driver.position}" data-laptime="${t}" data-gap="null" data-delta="${deltaMs}" data-color="${color}" data-incident="${isIncident ? 1 : 0}" data-fl="${isFl ? 1 : 0}"`;

      if (isFl) {
        parts.push(`<polygon points="${starPoints(x, y, 7.5, 3.2)}" fill="${color}" stroke="#f5c842" stroke-width="1.8" opacity="0.97" ${da}/>`);
      } else {
        parts.push(`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${isIncident ? 5 : 3.5}" fill="${isIncident ? '#ff3030' : color}" stroke="${isIncident ? '#ff0000' : color}" stroke-width="${isIncident ? 1.5 : 0.8}" opacity="0.95"/>`);
        parts.push(`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="9" fill="transparent" stroke="none" ${da}/>`);
      }
    }

    // Driver label at end of last valid lap
    if (showThru >= 1) {
      const lastL = Math.min(showThru, driver.lapTimes.length);
      const lastT = driver.lapTimes[lastL - 1];
      if (lastT >= FLOOR_FILTER_MS) {
        const ex = xAt(lastL), ey = yAt(lastT);
        const label = driver.driverName.length > 15 ? driver.driverName.slice(0, 14) + '…' : driver.driverName;
        parts.push(`<rect x="${(ex + 7).toFixed(1)}" y="${(ey - 7).toFixed(1)}" width="8" height="8" fill="${color}" rx="2"/>`);
        parts.push(`<text x="${(ex + 18).toFixed(1)}" y="${(ey + 3).toFixed(1)}" fill="${color}" font-size="12" font-family="Inter,system-ui,sans-serif" font-weight="600">${escHtml(label)}</text>`);
      }
    }
  });

  parts.push('</svg>');
  container.className = '';
  container.innerHTML = parts.join('');
  applyHighlight();
}

// ═══════════════════════════════════════════════════════════════
//  Gap Chart  (gap to leader over laps)
// ═══════════════════════════════════════════════════════════════
function renderGapChart() {
  const container = document.getElementById('vizArea');
  if (!currentHeat || !currentHeat.results.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">📊</div><div>Select a race from the left panel</div></div>`;
    return;
  }
  const results = currentHeat.results;
  const { posMap, maxLap } = currentHeat._posMap;
  const { gapAt } = computeRaceData(results, maxLap);

  let maxGapMs = 0;
  for (const r of results) {
    for (let l = 1; l <= maxLap; l++) {
      const g = gapAt[r.driverName][l];
      if (g != null && g > maxGapMs) maxGapMs = g;
    }
  }
  if (maxGapMs < 1000) maxGapMs = 1000;

  const W      = Math.max(400, container.getBoundingClientRect().width || 700);
  const trackW = W - VIZ_ML - VIZ_MR;
  const trackH = Math.max(220, Math.min(320, Math.floor((window.innerHeight - 200) * 0.45)));
  const H      = trackH + VIZ_MT + VIZ_MB;
  const showThru = Math.min(leaderLap, maxLap);

  const xAt = lap => VIZ_ML + ((lap - 1) / Math.max(maxLap - 1, 1)) * trackW;
  const yAt = ms  => VIZ_MT + (ms / maxGapMs) * trackH;

  const sorted = [...results].sort((a, b) => a.position - b.position);
  const colorOf = {};
  sorted.forEach((r, i) => { colorOf[r.driverName] = DRIVER_COLORS[i % DRIVER_COLORS.length]; });

  const parts = [`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}">`];

  // Y-axis (gap in seconds)
  const gapStepMs = Math.max(1000, Math.ceil((maxGapMs / 1000) / 5) * 1000);
  for (let g = 0; g <= maxGapMs; g += gapStepMs) {
    const y = yAt(g);
    parts.push(`<line x1="${VIZ_ML}" y1="${y.toFixed(1)}" x2="${VIZ_ML + trackW}" y2="${y.toFixed(1)}" stroke="#1a1a1a" stroke-width="1"/>`);
    const label = g === 0 ? 'Leader' : `+${(g / 1000).toFixed(0)}s`;
    parts.push(`<text x="${VIZ_ML - 6}" y="${(y + 4).toFixed(1)}" fill="#555555" font-size="11" text-anchor="end" font-family="Inter,system-ui,sans-serif">${label}</text>`);
  }

  // X-axis
  const lapStep = maxLap <= 15 ? 2 : maxLap <= 35 ? 5 : 10;
  const tickLaps = new Set([1, maxLap]);
  for (let l = lapStep; l < maxLap; l += lapStep) tickLaps.add(l);
  for (const l of [...tickLaps].sort((a, b) => a - b)) {
    const x = xAt(l);
    parts.push(`<line x1="${x.toFixed(1)}" y1="${VIZ_MT}" x2="${x.toFixed(1)}" y2="${VIZ_MT + trackH}" stroke="#1a1a1a" stroke-dasharray="2,4" stroke-width="1"/>`);
    parts.push(`<text x="${x.toFixed(1)}" y="${VIZ_MT + trackH + 16}" fill="#555555" font-size="11" text-anchor="middle" font-family="Inter,system-ui,sans-serif">${l}</text>`);
  }
  parts.push(`<text x="${VIZ_ML + trackW / 2}" y="${H - 2}" fill="#444444" font-size="10" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="500">Laps</text>`);

  // Driver lines + dots
  results.forEach(driver => {
    const color = colorOf[driver.driverName];
    const gaps  = gapAt[driver.driverName];
    const pts   = [];
    for (let l = 1; l <= Math.min(showThru, maxLap); l++) {
      if (gaps[l] != null) pts.push(`${xAt(l).toFixed(1)},${yAt(gaps[l]).toFixed(1)}`);
    }
    if (pts.length >= 2) {
      parts.push(`<polyline data-drivername="${escHtml(driver.driverName)}" points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>`);
    }
    for (let l = 1; l <= Math.min(showThru, maxLap); l++) {
      if (gaps[l] == null) continue;
      const x = xAt(l), y = yAt(gaps[l]);
      const curPos = posMap[driver.driverName]?.[l] ?? driver.position;
      const da = `data-lap="${l}" data-driver="${escHtml(driver.driverName)}" data-pos="${curPos}" data-laptime="${driver.lapTimes[l - 1] ?? 'null'}" data-gap="${gaps[l]}" data-delta="null" data-color="${color}" data-incident="0" data-fl="0"`;
      parts.push(`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="${color}" opacity="0.9"/>`);
      parts.push(`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="9" fill="transparent" stroke="none" ${da}/>`);
    }
    // Label at end
    for (let l = Math.min(showThru, maxLap); l >= 1; l--) {
      if (gaps[l] != null) {
        const ex = xAt(l), ey = yAt(gaps[l]);
        const label = driver.driverName.length > 15 ? driver.driverName.slice(0, 14) + '…' : driver.driverName;
        parts.push(`<rect x="${(ex + 7).toFixed(1)}" y="${(ey - 7).toFixed(1)}" width="8" height="8" fill="${color}" rx="2"/>`);
        parts.push(`<text x="${(ex + 18).toFixed(1)}" y="${(ey + 3).toFixed(1)}" fill="${color}" font-size="12" font-family="Inter,system-ui,sans-serif" font-weight="600">${escHtml(label)}</text>`);
        break;
      }
    }
  });

  parts.push('</svg>');
  container.className = '';
  container.innerHTML = parts.join('');
  applyHighlight();
}

// ═══════════════════════════════════════════════════════════════
//  Pace Chart  (3-lap rolling average)
// ═══════════════════════════════════════════════════════════════
function renderPaceChart() {
  const container = document.getElementById('vizArea');
  if (!currentHeat || !currentHeat.results.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">📊</div><div>Select a race from the left panel</div></div>`;
    return;
  }
  const WINDOW  = 3;
  const results = currentHeat.results;
  const maxLap  = Math.max(...results.map(r => r.lapTimes.length));

  // 3-lap rolling average, skipping incidents
  const rollingOf = {};
  for (const r of results) {
    rollingOf[r.driverName] = new Array(maxLap + 1).fill(null);
    for (let l = WINDOW; l <= r.lapTimes.length; l++) {
      const slice = r.lapTimes.slice(l - WINDOW, l);
      const clean = slice.filter((t, i) => {
        const meta = r.lapMeta?.[l - WINDOW + i];
        return meta?.type !== 'incident' && t >= FLOOR_FILTER_MS;
      });
      if (clean.length >= 2) {
        rollingOf[r.driverName][l] = clean.reduce((a, b) => a + b, 0) / clean.length;
      }
    }
  }

  const allVals = [];
  for (const r of results) {
    for (let l = 1; l <= maxLap; l++) {
      const v = rollingOf[r.driverName][l];
      if (v != null) allVals.push(v);
    }
  }
  if (!allVals.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">📊</div><div>Not enough lap data for pace chart</div></div>`;
    return;
  }

  const minMs  = Math.min(...allVals) * 0.97;
  const maxMs  = Math.max(...allVals) * 1.03;
  const W      = Math.max(400, container.getBoundingClientRect().width || 700);
  const trackW = W - VIZ_ML - VIZ_MR;
  const trackH = Math.max(220, Math.min(320, Math.floor((window.innerHeight - 200) * 0.45)));
  const H      = trackH + VIZ_MT + VIZ_MB;
  const showThru = Math.min(leaderLap, maxLap);

  const xAt = lap => VIZ_ML + ((lap - 1) / Math.max(maxLap - 1, 1)) * trackW;
  const yAt = ms  => VIZ_MT + ((ms - minMs) / (maxMs - minMs)) * trackH;

  const sorted = [...results].sort((a, b) => a.position - b.position);
  const colorOf = {};
  sorted.forEach((r, i) => { colorOf[r.driverName] = DRIVER_COLORS[i % DRIVER_COLORS.length]; });

  const parts = [`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}">`];

  // Y-axis
  const step = Math.ceil((maxMs - minMs) / 5 / 500) * 500 || 1000;
  for (let t = Math.ceil(minMs / step) * step; t <= maxMs; t += step) {
    const y = yAt(t);
    parts.push(`<line x1="${VIZ_ML}" y1="${y.toFixed(1)}" x2="${VIZ_ML + trackW}" y2="${y.toFixed(1)}" stroke="#1a1a1a" stroke-width="1"/>`);
    parts.push(`<text x="${VIZ_ML - 6}" y="${(y + 4).toFixed(1)}" fill="#555555" font-size="11" text-anchor="end" font-family="Inter,system-ui,sans-serif">${msToStr(t)}</text>`);
  }

  // X-axis
  const lapStep = maxLap <= 15 ? 2 : maxLap <= 35 ? 5 : 10;
  const tickLaps = new Set([WINDOW, maxLap]);
  for (let l = lapStep; l < maxLap; l += lapStep) tickLaps.add(l);
  for (const l of [...tickLaps].sort((a, b) => a - b)) {
    const x = xAt(l);
    parts.push(`<line x1="${x.toFixed(1)}" y1="${VIZ_MT}" x2="${x.toFixed(1)}" y2="${VIZ_MT + trackH}" stroke="#1a1a1a" stroke-dasharray="2,4" stroke-width="1"/>`);
    parts.push(`<text x="${x.toFixed(1)}" y="${VIZ_MT + trackH + 16}" fill="#555555" font-size="11" text-anchor="middle" font-family="Inter,system-ui,sans-serif">${l}</text>`);
  }
  parts.push(`<text x="${VIZ_ML + trackW / 2}" y="${H - 2}" fill="#444444" font-size="10" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="500">Laps (3-lap rolling avg)</text>`);

  // Driver lines
  results.forEach(driver => {
    const color   = colorOf[driver.driverName];
    const rolling = rollingOf[driver.driverName];
    const pts = [];
    for (let l = 1; l <= Math.min(showThru, maxLap); l++) {
      if (rolling[l] != null) pts.push(`${xAt(l).toFixed(1)},${yAt(rolling[l]).toFixed(1)}`);
    }
    if (pts.length >= 2) {
      parts.push(`<polyline data-drivername="${escHtml(driver.driverName)}" points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>`);
    }
    // Label at last valid rolling point
    for (let l = Math.min(showThru, maxLap); l >= WINDOW; l--) {
      if (rolling[l] != null) {
        const ex = xAt(l), ey = yAt(rolling[l]);
        const label = driver.driverName.length > 15 ? driver.driverName.slice(0, 14) + '…' : driver.driverName;
        parts.push(`<rect x="${(ex + 7).toFixed(1)}" y="${(ey - 7).toFixed(1)}" width="8" height="8" fill="${color}" rx="2"/>`);
        parts.push(`<text x="${(ex + 18).toFixed(1)}" y="${(ey + 3).toFixed(1)}" fill="${color}" font-size="12" font-family="Inter,system-ui,sans-serif" font-weight="600">${escHtml(label)}</text>`);
        break;
      }
    }
  });

  parts.push('</svg>');
  container.className = '';
  container.innerHTML = parts.join('');
  applyHighlight();
}

// ═══════════════════════════════════════════════════════════════
//  Live Timing Table
// ═══════════════════════════════════════════════════════════════
function renderTable() {
  const wrap = document.getElementById('tableWrap');
  if (!currentHeat || !currentHeat.results.length) {
    wrap.innerHTML = `<div class="empty-state"><div class="icon">📋</div><div>Select a race from the left panel</div></div>`;
    return;
  }
  const results  = currentHeat.results;
  const maxLap   = Math.max(...results.map(r => r.lapTimes.length));
  const showThru = Math.min(leaderLap, maxLap);
  const { posMap } = currentHeat._posMap;

  // Fastest lap of the race
  let overallFastestMs = Infinity;
  for (const r of results) {
    if (r.fastestLapMs && r.fastestLapMs < overallFastestMs) overallFastestMs = r.fastestLapMs;
  }

  // Sort drivers by current position
  const sorted = [...results].sort((a, b) => {
    const pa = posMap[a.driverName]?.[showThru] ?? 99;
    const pb = posMap[b.driverName]?.[showThru] ?? 99;
    return pa - pb;
  });
  const colorOf = {};
  [...results].sort((a, b) => a.position - b.position)
    .forEach((r, i) => { colorOf[r.driverName] = DRIVER_COLORS[i % DRIVER_COLORS.length]; });

  let html = `<div style="overflow:auto;height:100%;padding:14px 18px"><table class="timing-table"><thead><tr>`;
  html += `<th class="timing-driver-col">Driver</th>`;
  for (let l = 1; l <= showThru; l++) {
    html += `<th class="${l === showThru ? 'timing-cur' : ''}">${l}</th>`;
  }
  html += `</tr></thead><tbody>`;

  for (const driver of sorted) {
    const curPos = posMap[driver.driverName]?.[showThru] ?? driver.position;
    const color  = colorOf[driver.driverName];
    const cons   = getDriverConsistency(driver);
    const consTag = cons != null
      ? ` <span style="font-size:10px;color:${cons >= 90 ? '#2ecc71' : cons >= 75 ? '#f5c842' : '#e53935'};font-weight:600">${cons >= 92 ? '🎯' : cons < 65 ? '🌪️' : ''}${cons.toFixed(0)}%</span>`
      : '';
    html += `<tr><td class="timing-driver-col" style="color:${color}">P${curPos} ${escHtml(driver.driverName)}${consTag}</td>`;
    for (let l = 1; l <= showThru; l++) {
      const t = driver.lapTimes[l - 1];
      if (t == null) { html += `<td class="${l === showThru ? 'timing-cur' : ''}">—</td>`; continue; }
      const meta = driver.lapMeta?.[l - 1] ?? { type: 'clean', delta: 0 };
      const isFl   = t === overallFastestMs && driver.fastestLapMs === overallFastestMs && isFinite(overallFastestMs);
      const isPb   = !isFl && t === driver.fastestLapMs;
      const isInc  = meta.type === 'incident';
      const isCur  = l === showThru;
      let cls = '';
      if (isFl)      cls = 'timing-fl';
      else if (isPb) cls = 'timing-pb';
      else if (isInc) cls = 'timing-inc';
      if (isCur) cls += (cls ? ' ' : '') + 'timing-cur';
      html += `<td${cls ? ` class="${cls}"` : ''}>${msToStr(t)}</td>`;
    }
    html += `</tr>`;
  }
  html += `</tbody></table></div>`;
  wrap.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
//  Consistency helper  (used by table + heatmap)
// ═══════════════════════════════════════════════════════════════
function getDriverConsistency(driver) {
  if (driver.consistencyPct != null) return driver.consistencyPct;
  if (driver.topAvgMs == null) return null;
  const clean = driver.lapTimes.filter((t, i) => driver.lapMeta?.[i]?.type === 'clean');
  if (clean.length < 3) return null;
  const mean = clean.reduce((a, b) => a + b, 0) / clean.length;
  const variance = clean.reduce((s, t) => s + (t - mean) ** 2, 0) / clean.length;
  const cv = Math.sqrt(variance) / mean;
  return Math.max(0, Math.min(100, (1 - cv * 5) * 100));
}

// ═══════════════════════════════════════════════════════════════
//  Consistency Heat Map  (lap quality grid)
// ═══════════════════════════════════════════════════════════════
function renderHeatmapChart() {
  const container = document.getElementById('vizArea');
  if (!currentHeat || !currentHeat.results.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">🏁</div><div>Select a race from the left panel</div></div>`;
    return;
  }

  const results  = currentHeat.results;
  const maxLap   = Math.max(...results.map(r => r.lapTimes.length));
  const showThru = Math.min(leaderLap, maxLap);
  const sorted   = [...results].sort((a, b) => a.position - b.position);
  const n        = sorted.length;
  const { posMap } = currentHeat._posMap;

  const colorOf = {};
  sorted.forEach((r, i) => { colorOf[r.driverName] = DRIVER_COLORS[i % DRIVER_COLORS.length]; });

  // Race fastest lap
  let raceFLMs = Infinity, raceFLDriver = null;
  for (const r of results) {
    if (r.fastestLapMs && r.fastestLapMs < raceFLMs) { raceFLMs = r.fastestLapMs; raceFLDriver = r.driverName; }
  }

  const W       = Math.max(400, container.getBoundingClientRect().width || 700);
  // LABEL_W sized dynamically to the longest driver name in this race.
  // ~8px/char for all-caps Inter at 11px, plus ~30px for the "P12 · " prefix.
  const longestName = Math.max(...sorted.map(r => r.driverName.length));
  const nameTrunc   = Math.min(longestName, 18);
  const LABEL_W     = Math.max(110, Math.min(185, nameTrunc * 8 + 32));
  const PAD_R   = 12;
  const PAD_T   = 24;  // lap number labels
  const PAD_B   = 46;  // legend (two lines)
  const ROW_H   = 32;
  const GAP     = 2;
  const cellW   = Math.min(30, Math.max(8, Math.floor((W - LABEL_W - PAD_R) / Math.max(showThru, 1))));
  const H       = PAD_T + n * ROW_H + PAD_B;

  const parts = [`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" style="font-family:Inter,system-ui,sans-serif">`];

  // Lap number labels along the top
  const lapStep = showThru <= 15 ? 2 : showThru <= 35 ? 5 : 10;
  for (let l = 1; l <= showThru; l++) {
    if (l === 1 || l === showThru || l % lapStep === 0) {
      const x = LABEL_W + (l - 0.5) * cellW;
      parts.push(`<text x="${x.toFixed(1)}" y="16" fill="#555555" font-size="10" text-anchor="middle">${l}</text>`);
    }
  }

  // Driver rows
  sorted.forEach((driver, ri) => {
    const y0    = PAD_T + ri * ROW_H;
    const color = colorOf[driver.driverName];
    // Single right-aligned label: "P1 · NAME" — no overlap possible
    const nameStr  = driver.driverName.length > 12 ? driver.driverName.slice(0, 11) + '…' : driver.driverName;
    const rowLabel = `P${driver.position} · ${nameStr}`;
    parts.push(`<text x="${LABEL_W - 7}" y="${(y0 + ROW_H / 2 + 4).toFixed(1)}" fill="${color}" font-size="11" text-anchor="end" font-weight="600" data-driver="${escHtml(driver.driverName)}">${escHtml(rowLabel)}</text>`);

    for (let l = 1; l <= showThru; l++) {
      const t    = driver.lapTimes[l - 1];
      const meta = driver.lapMeta?.[l - 1] ?? { type: 'clean', delta: 0 };
      const x0   = LABEL_W + (l - 1) * cellW;
      const rx   = x0 + GAP / 2, ry = y0 + GAP / 2;
      const rw   = cellW - GAP, rh = ROW_H - GAP;

      const isRaceFL = t != null && t === raceFLMs && driver.driverName === raceFLDriver && isFinite(raceFLMs);
      const isPB     = !isRaceFL && t != null && t === driver.fastestLapMs;

      let fill, extraClass = '';
      if (t == null) {
        fill = '#111111';
      } else if (meta.type === 'floor') {
        fill = '#131313'; // pit / filtered — barely visible
      } else if (meta.type === 'incident') {
        extraClass = 'hm-inc';
        fill = meta.delta > 4000 ? '#6e0000' : meta.delta > 2000 ? '#a01828' : '#cc3030';
      } else if (isRaceFL) {
        fill = '#f5c842';
      } else if (isPB) {
        fill = color;
      } else {
        // Shade by distance from personal best
        const ref = driver.fastestLapMs ?? t;
        const drift = ref ? (t - ref) / ref : 0;
        if      (drift < 0.03) fill = color + 'cc';
        else if (drift < 0.08) fill = color + '77';
        else if (drift < 0.15) fill = color + '3a';
        else                   fill = '#b06010';  // notably slow
      }

      const curPos = posMap[driver.driverName]?.[l] ?? driver.position;
      const da = `data-lap="${l}" data-driver="${escHtml(driver.driverName)}" data-pos="${curPos}" data-laptime="${t ?? 'null'}" data-gap="null" data-delta="null" data-color="${color}" data-incident="${meta.type === 'incident' ? 1 : 0}" data-fl="${isRaceFL ? 1 : 0}"`;

      parts.push(`<rect class="${extraClass}" x="${rx.toFixed(1)}" y="${ry.toFixed(1)}" width="${rw.toFixed(1)}" height="${rh.toFixed(1)}" fill="${fill}" rx="3" ${da}/>`);

      // Race FL: small star overlay
      if (isRaceFL) {
        const sx = rx + rw / 2, sy = ry + rh / 2 + 4;
        parts.push(`<text x="${sx.toFixed(1)}" y="${sy.toFixed(1)}" fill="#1a1000" font-size="11" text-anchor="middle" font-weight="700" pointer-events="none">★</text>`);
      }
    }
  });

  // Legend — line 1: scale concept (no swatches, just words)
  const ly1 = PAD_T + n * ROW_H + 13;
  parts.push(`<text x="${LABEL_W}" y="${ly1}" fill="#444444" font-size="10" font-style="italic">Brighter cell = closer to personal best · darker = slower</text>`);

  // Legend — line 2: the 3 special fixed-color cases only
  const ly2 = ly1 + 18;
  const specials = [
    { fill: '#f5c842', label: '★  Race FL' },
    { fill: '#cc3030', label: '💥  Incident (pulses)', cls: 'hm-inc' },
    { fill: '#131313', stroke: '#252525', label: 'Pit / filtered lap' },
  ];
  let lx = LABEL_W;
  for (const s of specials) {
    parts.push(`<rect${s.cls ? ` class="${s.cls}"` : ''} x="${lx}" y="${ly2 - 9}" width="12" height="12" fill="${s.fill}" stroke="${s.stroke ?? 'none'}" stroke-width="1" rx="2"/>`);
    parts.push(`<text x="${lx + 16}" y="${ly2 + 1}" fill="#555555" font-size="10">${escHtml(s.label)}</text>`);
    lx += s.label.replace(/[^\x00-\x7F]/g, '  ').length * 5.6 + 24;
  }

  parts.push('</svg>');
  container.className = '';
  container.innerHTML = parts.join('');
  applyHighlight();
}

// ═══════════════════════════════════════════════════════════════
//  Event Summary  (heat card grid when no race is selected)
// ═══════════════════════════════════════════════════════════════
function renderEventSummary() {
  if (!currentEvent || !currentEvent.heats.length) return;
  const area = document.getElementById('vizArea');
  const mains = currentEvent.heats.filter(h => /main|final/i.test(h.label));
  const quals  = currentEvent.heats.filter(h => !/main|final/i.test(h.label));
  const groups = [];
  if (mains.length) groups.push({ label: 'Main Events', heats: mains });
  if (quals.length) groups.push({ label: 'Qualifiers / Heats', heats: quals });
  if (!groups.length) groups.push({ label: '', heats: currentEvent.heats });

  let html = '';
  for (const g of groups) {
    if (g.label) html += `<div style="font-size:10px;font-weight:600;color:#444444;text-transform:uppercase;letter-spacing:1px;padding:8px 2px 6px">${escHtml(g.label)}</div>`;
    html += `<div class="event-summary-grid">`;
    for (const heat of g.heats) {
      html += `<div class="event-heat-card" onclick="selectHeat('${escHtml(heat.raceId)}')">
        <div class="ehc-name">${escHtml(heat.label)}</div>
        <span class="ehc-badge">Click to load</span>
      </div>`;
    }
    html += `</div>`;
  }
  area.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
//  Heat list rendering
// ═══════════════════════════════════════════════════════════════
function renderHeatList() {
  const el = document.getElementById('heatList');
  if (!currentEvent || !currentEvent.heats.length) {
    el.innerHTML = `<div style="padding:8px 4px;font-size:13px;color:#444">No heats found</div>`;
    return;
  }

  // Group by "Main Events" vs qualifiers (simple heuristic)
  const mains = currentEvent.heats.filter(h => /main|final/i.test(h.label));
  const quals  = currentEvent.heats.filter(h => !/main|final/i.test(h.label));

  let html = '';
  if (mains.length) {
    html += `<div class="heat-section">Main Events</div>`;
    html += mains.map(h => heatItem(h)).join('');
  }
  if (quals.length) {
    html += `<div class="heat-section">Qualifiers / Heats</div>`;
    html += quals.map(h => heatItem(h)).join('');
  }
  if (!mains.length && !quals.length) {
    html = currentEvent.heats.map(h => heatItem(h)).join('');
  }

  el.innerHTML = html;
}

function heatItem(heat) {
  const active = currentHeat?.raceId === heat.raceId ? ' active' : '';
  return `<div class="heat-item${active}" onclick="selectHeat('${heat.raceId}')">${escHtml(heat.label)}</div>`;
}

// ═══════════════════════════════════════════════════════════════
//  Load handlers
// ═══════════════════════════════════════════════════════════════
async function loadEvent() {
  const url = document.getElementById('eventUrl').value.trim();
  if (!url) return;
  stopAnimation();

  document.getElementById('heatList').innerHTML =
    `<div style="padding:8px 4px;font-size:13px;color:#555">Loading…</div>`;

  try {
    const baseUrl = new URL(url).origin;
    const html = await fetchLiverc(url);
    currentEvent = parseEventPage(html, baseUrl);
    currentHeat  = null;
    highlightedDriver = null;
    localStorage.setItem('rc_last_event_url', url);

    document.getElementById('raceTitle').textContent = currentEvent.eventName;
    document.getElementById('raceSub').textContent   = `${currentEvent.heats.length} heat${currentEvent.heats.length !== 1 ? 's' : ''} — click one to load`;
    document.getElementById('lapCounter').textContent = '—';
    document.getElementById('raceTime').textContent   = '';
    document.getElementById('statsArea').innerHTML      = '';
    document.getElementById('fastestLapsArea').innerHTML = '';
    document.getElementById('spicyArea').innerHTML       = '';
    document.getElementById('playBtn').disabled          = true;
    document.getElementById('raceControls').style.display   = 'none';
    document.getElementById('statsHeader').style.display    = 'none';
    document.getElementById('sparklineHint').style.display  = 'none';
    document.getElementById('scrubberWrap').style.display  = 'none';
    document.getElementById('spicyPanel').style.display    = 'none';
    document.getElementById('rh-spicy').style.display      = 'none';
    document.getElementById('vizWrap').style.display       = '';
    document.getElementById('tableWrap').style.display     = 'none';

    renderHeatList();
    renderEventSummary();
    pushUrlHash();
  } catch (err) {
    document.getElementById('heatList').innerHTML =
      `<div class="error-msg" style="padding:8px 4px;font-size:13px">Error: ${escHtml(err.message)}</div>`;
  }
}

async function loadSingleRace() {
  const url = document.getElementById('raceUrl').value.trim();
  if (!url) return;
  stopAnimation();

  // Build a minimal currentEvent if we don't have one
  try {
    const baseUrl = new URL(url).origin;
    if (!currentEvent) {
      currentEvent = { eventName: 'Single Race', baseUrl, heats: [] };
    }
    localStorage.setItem('rc_last_race_url', url);
    await loadRaceUrl(url);
  } catch (err) {
    showVizError(err.message);
  }
}

async function selectHeat(raceId) {
  if (!currentEvent) return;
  stopAnimation();
  const baseUrl = currentEvent.baseUrl;
  const url = `${baseUrl}/results/?p=view_race_result&id=${raceId}`;
  await loadRaceUrl(url);
}

async function loadRaceUrl(url) {
  document.getElementById('playBtn').disabled = true;
  document.getElementById('vizArea').innerHTML = `<div class="empty-state">
    <div class="icon" style="font-size:28px">⏳</div><div>Loading race data…</div></div>`;
  document.getElementById('statsArea').innerHTML  = '';
  document.getElementById('spicyArea').innerHTML  = '';

  try {
    const html = await fetchLiverc(url);
    const race = parseRacePage(html);

    if (!race.results.length) throw new Error('No results found on this page — check the URL');

    computeIncidents(race.results);
    const _posMap = computePositionsByLap(race.results);

    // Inject raceId so heat list can highlight the active item
    const m = url.match(/id=(\d+)/);
    currentHeat = { ...race, raceId: m ? m[1] : null, _posMap };

    // Ensure it's in the event's heat list (for single-race loads)
    if (m && currentEvent && !currentEvent.heats.find(h => h.raceId === m[1])) {
      currentEvent.heats.push({
        raceId: m[1],
        label: `${race.className}${race.heatName ? ' ' + race.heatName : ''}`,
      });
    }

    highlightedDriver = null;

    const sorted = [...race.results].sort((a, b) => a.position - b.position);
    const leader = sorted[0];
    maxLeaderLap = leader.laps
      ?? Math.max(...race.results.map(r => r.lapTimes.length), 1);
    leaderLap    = maxLeaderLap;   // start fully replayed

    const label = `${race.className}${race.heatName ? ' — ' + race.heatName : ''}`;
    document.getElementById('raceTitle').textContent = label;
    document.getElementById('raceSub').textContent   = `${race.results.length} drivers`;
    document.getElementById('raceTime').textContent  = leader.totalTimeMs ? `Race time: ${msToStr(leader.totalTimeMs)}` : '';
    document.getElementById('playBtn').disabled          = false;
    document.getElementById('raceControls').style.display  = 'flex';
    document.getElementById('statsHeader').style.display    = 'block';
    document.getElementById('sparklineHint').style.display  = 'block';
    document.getElementById('spicyPanel').style.display     = 'flex';
    document.getElementById('rh-spicy').style.display       = 'block';
    viewMode = 'chart';
    chartMode = 'position';
    document.getElementById('vizWrap').style.display   = '';
    document.getElementById('tableWrap').style.display = 'none';
    document.querySelectorAll('.chart-tab').forEach(btn => {
      btn.classList.toggle('active', btn.getAttribute('onclick').includes("'position'"));
    });
    document.querySelectorAll('.view-tab').forEach(btn => {
      btn.classList.toggle('active', btn.getAttribute('onclick').includes("'chart'"));
    });

    updateHeader();
    updateScrubber();
    renderVisualization();
    renderStats();
    renderConsistency();
    renderHeatList();       // update active highlight
    generateSpicyAnalysis();
    pushUrlHash();
  } catch (err) {
    showVizError(err.message);
  }
}

function showVizError(msg) {
  document.getElementById('vizArea').innerHTML = `<div class="empty-state">
    <div class="icon">❌</div>
    <div class="error-msg">${escHtml(msg)}</div></div>`;
}

function stopAnimation() {
  if (playTimer) clearInterval(playTimer);
  isPlaying = false;
  document.getElementById('playBtn').textContent = '▶ Play';
}

// ═══════════════════════════════════════════════════════════════
//  Resize → re-render
// ═══════════════════════════════════════════════════════════════
let resizeDebounce = null;
window.addEventListener('resize', () => {
  clearTimeout(resizeDebounce);
  resizeDebounce = setTimeout(() => { if (currentHeat) renderVisualization(); }, 120);
});

// ═══════════════════════════════════════════════════════════════
//  Tooltip
// ═══════════════════════════════════════════════════════════════
const tooltip = document.getElementById('tooltip');

document.getElementById('vizWrap').addEventListener('mousemove', e => {
  const dot = e.target.closest('[data-lap]');
  if (!dot) { tooltip.style.display = 'none'; return; }

  const lap     = parseInt(dot.dataset.lap);
  const color   = dot.dataset.color || '#e0e0e0';

  if (lap === 0) {
    // Grid start — show simple label
    const pos = dot.dataset.pos;
    tooltip.innerHTML = `<div class="tt-driver" style="color:${color}">${escHtml(dot.dataset.driver)}</div>
      <div class="tt-row"><span>Grid position</span><span class="tt-v">P${pos}</span></div>`;
  } else {
    const lapTimeMs = parseInt(dot.dataset.laptime);
    const gapMs     = dot.dataset.gap !== 'null' ? parseInt(dot.dataset.gap) : null;
    const deltaMs   = dot.dataset.delta !== 'null' ? parseInt(dot.dataset.delta) : null;
    const pos       = dot.dataset.pos;
    const isIncident = dot.dataset.incident === '1';
    const isFl       = dot.dataset.fl === '1';

    let html = `<div class="tt-driver" style="color:${color}">${escHtml(dot.dataset.driver)}</div>`;
    html += `<div class="tt-row"><span>Lap</span><span class="tt-v">${lap}</span></div>`;
    html += `<div class="tt-row"><span>Position</span><span class="tt-v">P${pos}</span></div>`;
    html += `<hr class="tt-divider">`;
    html += `<div class="tt-row"><span>Lap time</span><span class="tt-v">${msToStr(lapTimeMs)}</span></div>`;

    if (deltaMs !== null) {
      const sign = deltaMs >= 0 ? '+' : '−';
      const col  = deltaMs > 0 ? '#e53935' : '#4caf50';
      html += `<div class="tt-row"><span>Δ prev lap</span><span class="tt-v" style="color:${col}">${sign}${msToStr(Math.abs(deltaMs))}</span></div>`;
    }

    if (gapMs !== null) {
      if (gapMs === 0) {
        html += `<div class="tt-row"><span>Gap</span><span class="tt-v" style="color:#4caf50">Leader</span></div>`;
      } else {
        html += `<div class="tt-row"><span>Gap to leader</span><span class="tt-v">+${msToStr(gapMs)}</span></div>`;
      }
    }

    if (isIncident || isFl) {
      html += `<hr class="tt-divider">`;
      if (isFl)       html += `<div class="tt-badge" style="color:#f5c842">★ Fastest lap</div>`;
      if (isIncident) html += `<div class="tt-badge" style="color:#e53935">⚠ Incident +${((parseInt(dot.dataset.laptime) - (currentHeat?.results.find(r => r.driverName === dot.dataset.driver)?.topAvgMs ?? 0) - 2000) / 1000).toFixed(1)}s over threshold</div>`;
    }

    tooltip.innerHTML = html;
  }

  tooltip.style.display = 'block';
  const tx = e.clientX + 16;
  const ty = e.clientY - 12;
  const tw = tooltip.offsetWidth;
  const th = tooltip.offsetHeight;
  tooltip.style.left = (tx + tw > window.innerWidth  ? tx - tw - 32 : tx) + 'px';
  tooltip.style.top  = (ty + th > window.innerHeight ? ty - th      : ty) + 'px';
});

document.getElementById('vizWrap').addEventListener('mouseleave', () => {
  tooltip.style.display = 'none';
});

// ═══════════════════════════════════════════════════════════════
//  Click-to-scrub on SVG
// ═══════════════════════════════════════════════════════════════
document.getElementById('vizWrap').addEventListener('click', e => {
  if (!currentHeat) return;
  // Only scrub on direct SVG background clicks (not dot clicks)
  if (e.target.closest('[data-lap]')) return;
  const svg = e.currentTarget.querySelector('svg');
  if (!svg) return;
  const rect = svg.getBoundingClientRect();
  const relX = e.clientX - rect.left - VIZ_ML;
  const trackW = rect.width - VIZ_ML - VIZ_MR;
  if (relX < 0 || relX > trackW) return;
  stopAnimation();
  scrubToLap(Math.round((relX / trackW) * maxLeaderLap));
});

// ═══════════════════════════════════════════════════════════════
//  Keyboard controls
// ═══════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (!currentHeat) return;
  if (e.target.tagName === 'INPUT') return;
  if (e.key === ' ' || e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); stopAnimation(); scrubToLap(leaderLap - 1); }
  if (e.key === 'ArrowRight') { e.preventDefault(); stopAnimation(); scrubToLap(leaderLap + 1); }
});

// ═══════════════════════════════════════════════════════════════
//  Scrubber drag
// ═══════════════════════════════════════════════════════════════
(function () {
  const track = document.getElementById('scrubberTrack');
  const thumb = document.getElementById('scrubberThumb');
  let dragging = false;

  function scrubFromEvent(e) {
    const rect = track.getBoundingClientRect();
    const pct  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    scrubToLap(Math.round(pct * maxLeaderLap));
  }

  track.addEventListener('mousedown', e => {
    if (!currentHeat) return;
    dragging = true;
    thumb.classList.add('dragging');
    stopAnimation();
    scrubFromEvent(e);
  });
  document.addEventListener('mousemove', e => { if (dragging) scrubFromEvent(e); });
  document.addEventListener('mouseup',   () => { dragging = false; thumb.classList.remove('dragging'); });
})();

// ═══════════════════════════════════════════════════════════════
//  Resizable panels
// ═══════════════════════════════════════════════════════════════
(function () {
  function makeResizable(handleId, targetId, side) {
    const handle = document.getElementById(handleId);
    const target = document.getElementById(targetId);
    let startX, startW;

    handle.addEventListener('mousedown', e => {
      startX = e.clientX;
      startW = target.offsetWidth;
      handle.classList.add('resizing');
      document.body.style.cursor      = 'col-resize';
      document.body.style.userSelect  = 'none';
      e.preventDefault();
    });

    document.addEventListener('mousemove', e => {
      if (!handle.classList.contains('resizing')) return;
      const delta = side === 'left' ? e.clientX - startX : startX - e.clientX;
      const newW  = Math.max(120, Math.min(500, startW + delta));
      target.style.width    = newW + 'px';
      target.style.minWidth = newW + 'px';
    });

    document.addEventListener('mouseup', () => {
      if (!handle.classList.contains('resizing')) return;
      handle.classList.remove('resizing');
      document.body.style.cursor     = '';
      document.body.style.userSelect = '';
      if (currentHeat) {
        clearTimeout(resizeDebounce);
        resizeDebounce = setTimeout(() => renderVisualization(), 80);
      }
    });
  }

  makeResizable('rh-left',  'sidebar-left',  'left');
  makeResizable('rh-right', 'sidebar-right', 'right');
})();

// Vertical resize for spicy analysis panel
(function () {
  const handle = document.getElementById('rh-spicy');
  const panel  = document.getElementById('spicyPanel');
  let startY, startH;

  handle.addEventListener('mousedown', e => {
    startY = e.clientY;
    startH = panel.offsetHeight;
    handle.classList.add('resizing');
    document.body.style.cursor     = 'row-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!handle.classList.contains('resizing')) return;
    const newH = Math.max(60, Math.min(500, startH + (startY - e.clientY)));
    panel.style.height = newH + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (!handle.classList.contains('resizing')) return;
    handle.classList.remove('resizing');
    document.body.style.cursor     = '';
    document.body.style.userSelect = '';
  });
})();

// ═══════════════════════════════════════════════════════════════
//  Mobile layout
// ═══════════════════════════════════════════════════════════════
function isMobile() {
  return window.innerWidth <= 768 && localStorage.getItem('forceDesktop') !== '1';
}

function forceDesktop() {
  localStorage.setItem('forceDesktop', '1');
  location.reload();
}

function clearForceDesktop() {
  localStorage.removeItem('forceDesktop');
  location.reload();
}

// ═══════════════════════════════════════════════════════════════
//  Startup — restore from URL hash, then localStorage, load env key
// ═══════════════════════════════════════════════════════════════
readUrlHash();
if (isMobile()) {
  document.documentElement.classList.add('mobile-active');
  document.body.classList.add('mobile-active');
}
if (window.innerWidth <= 768 && !isMobile()) {
  const btn = document.getElementById('switchModeBtn');
  if (btn) btn.style.display = '';
}
if (!document.getElementById('eventUrl').value) {
  const saved = localStorage.getItem('rc_last_event_url');
  if (saved) document.getElementById('eventUrl').value = saved;
}
if (!document.getElementById('raceUrl').value) {
  const saved = localStorage.getItem('rc_last_race_url');
  if (saved) document.getElementById('raceUrl').value = saved;
}

// Auto-load Gemini key from proxy .env (silently skip if proxy isn't running)
(async () => {
  try {
    const res = await fetch('/env', { signal: AbortSignal.timeout(2000) });
    if (!res.ok) return;
    const env = await res.json();
    if (env.GEMINI_KEY) {
      document.getElementById('apiKeyInput').value = env.GEMINI_KEY;
      localStorage.setItem('rc_gemini_key', env.GEMINI_KEY);
    }
  } catch { /* proxy not running — fall back to localStorage / manual paste */ }
})();
